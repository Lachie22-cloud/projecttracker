<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse — Second Brain</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --base: #07070B;
    --surface: #10101A;
    --elevated: #16161F;
    --hairline: rgba(255,255,255,0.06);
    --magenta: #FF2E93;
    --cyan: #00E5FF;

    font-family: var(--font-ui);

    color: var(--text);
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  #root { min-height: 100vh; position: relative; z-index: 1; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::selection { background: rgba(255,46,147,0.3); }
  input, textarea, select, button { font-family: inherit; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================================
// CONSTANTS & UTILITIES
// ============================================================
const STORAGE_KEY = "pcc-v9-synapse";
const API_KEY_KEY = "synapse-api-key";
const PROXY_KEY = "synapse-proxy-url";
function getProxyUrl() { return (localStorage.getItem(PROXY_KEY) || "").trim() || "https://api.anthropic.com"; }

// Migrate key from old app
(() => {
  if (!localStorage.getItem(API_KEY_KEY)) {
    const old = localStorage.getItem("pcc-api-key");
    if (old) { localStorage.setItem(API_KEY_KEY, old); }
  }
})();

function uid() { return "id_" + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function now() { return new Date().toISOString(); }
function touchNow(item) { return { ...item, touchedAt: now(), updatedAt: now() }; }
function daysSince(ts) { if (!ts) return 999; return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000); }
function isForgotten(item, n = 7) { return item.status !== "Complete" && daysSince(item.touchedAt || item.updatedAt || item.createdAt) > n; }
function fmt(ts) { if (!ts) return ""; const d = new Date(ts); return d.toLocaleDateString("en-AU", { day:"numeric", month:"short" }); }
function fmtTime(ts) { if (!ts) return ""; const d = new Date(ts); return d.toLocaleTimeString("en-AU", { hour:"2-digit", minute:"2-digit", hour12: false }); }
function fmtFull(ts) { if (!ts) return ""; const d = new Date(ts); return d.toLocaleDateString("en-AU", { day:"numeric", month:"short", year:"numeric" }) + " " + fmtTime(ts); }
function fmtRelative(ts) {
  if (!ts) return "";
  const d = daysSince(ts);
  if (d === 0) return "today";
  if (d === 1) return "yesterday";
  if (d < 7) return d + "d ago";
  if (d < 30) return Math.floor(d/7) + "w ago";
  return Math.floor(d/30) + "mo ago";
}

function getNextDue(due, recurrence) {
  if (!due || !recurrence) return null;
  const d = new Date(due + "T00:00:00");
  if (recurrence === "daily") d.setDate(d.getDate() + 1);
  else if (recurrence === "weekly") d.setDate(d.getDate() + 7);
  else if (recurrence === "monthly") d.setMonth(d.getMonth() + 1);
  else if (recurrence && recurrence.type === "custom") d.setDate(d.getDate() + (recurrence.days || 7));
  return d.toISOString().slice(0, 10);
}

function getRecurrenceLabel(rec) {
  if (!rec) return null;
  if (rec === "daily") return "Daily";
  if (rec === "weekly") return "Weekly";
  if (rec === "monthly") return "Monthly";
  if (rec && rec.type === "custom") return "Every " + rec.days + " days";
  return null;
}

function generateGhostDates(due, recurrence, endDate, limit) {
  if (!due || !recurrence) return [];
  const dates = [];
  let current = due;
  const maxDate = endDate || "2027-12-31";
  const maxCount = limit || 12;
  for (let i = 0; i < maxCount; i++) {
    const next = getNextDue(current, recurrence);
    if (!next || next > maxDate) break;
    dates.push(next);
    current = next;
  }
  return dates;
}

const STATUSES = ["Not Started", "In Progress", "On Hold", "Complete"];
const SC = { "Not Started": "#8A8AA0", "In Progress": "#00E5FF", "On Hold": "#FFB020", "Complete": "#3DFFB8" };
const PRIORITIES = ["Critical", "High", "Medium", "Low"];
const PC = { Critical: "#FF2E93", High: "#FF6B4A", Medium: "#FFB020", Low: "#8A8AA0" };
const EFFORTS = ["S", "M", "L", "XL"];
const EC = { S: "#3DFFB8", M: "#00E5FF", L: "#FFB020", XL: "#FF2E93" };

const DEFAULT_AREAS = [
  { id: "work", name: "Work", color: "#00E5FF", accent: "#00E5FF", icon: "💼", keywords: ["meeting", "report", "email", "slides", "review", "deadline"], userCreated: false },
  { id: "personal", name: "Personal", color: "#FF2E93", accent: "#FF2E93", icon: "🏠", keywords: ["home", "errand", "health", "appointment", "call"], userCreated: false },
  { id: "ideas", name: "Ideas", color: "#9B6DFF", accent: "#9B6DFF", icon: "💡", keywords: ["idea", "think", "explore", "research", "blog", "write"], userCreated: false },
];

const AREA_SWATCHES = ["#FF2E93", "#00E5FF", "#3DFFB8", "#FFB020", "#9B6DFF", "#FF6B4A", "#4ECDC4", "#F670C7"];

// ============================================================
// DATA LAYER
// ============================================================
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { notes: [], tasks: [], projects: [], areas: DEFAULT_AREAS, digests: [], proposals: [] };
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

// ============================================================
// AI LAYER
// ============================================================
function getApiKey() {
  const raw = localStorage.getItem(API_KEY_KEY);
  if (!raw) return null;
  // Strip any non-ASCII / invisible Unicode chars that break fetch headers
  return raw.trim().replace(/[^\x20-\x7E]/g, "");
}

async function aiParseCapture(rawText, areas, projects, recentNotes) {
  const apiKey = getApiKey();
  if (!apiKey) return null;
  const today = new Date().toISOString().slice(0, 10);
  const areaCtx = areas.map(a => `${a.name}(id:${a.id}): keywords=[${a.keywords.join(",")}]`).join("; ");
  const projCtx = projects.filter(p => p.status !== "Complete").map(p => `"${p.name}" (id:${p.id}, area:${p.areaId})`).join(", ");
  const recentCtx = (recentNotes || []).slice(0, 5).map(n => n.rawText.slice(0, 100)).join("\n");

  try {
    const r = await fetch(getProxyUrl() + "/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        messages: [{ role: "user", content: `You are a second-brain parser. Extract structured tasks from a mind dump. Be domain-agnostic.

Areas: ${areaCtx}
Active projects: ${projCtx || "none"}
Today: ${today}
Recent notes for context:
${recentCtx || "none"}

Parse this mind dump and return ONLY valid JSON (no markdown):
{
  "tasks": [{"name": "clean task name", "priority": "Critical|High|Medium|Low", "effort": "S|M|L|XL", "areaId": "area-id or null", "projectId": "project-id or null", "due": "YYYY-MM-DD or null", "confidence": 0.0-1.0, "sourceSpan": "original text fragment"}],
  "thoughts": ["non-actionable observations"],
  "newProjectProposals": [{"suggestedName": "name", "areaId": "area-id", "reason": "why this should be a project"}],
  "summary": "one-line summary of this dump"
}

If a line is clearly a task, confidence should be high (0.8+). If ambiguous, lower.
Assign areas based on keywords. If no area matches, use null.
Link to existing projects if the context matches.

Mind dump:
${rawText}` }]
      })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    return JSON.parse((d.content?.[0]?.text || "{}").replace(/```json|```/g, "").trim());
  } catch (e) { console.error("AI parse error:", e); window._lastAiError = e.message; return null; }
}

async function aiDigest(tasks, projects, areas) {
  const apiKey = getApiKey();
  if (!apiKey) return null;
  const today = new Date().toISOString().slice(0, 10);

  const tData = tasks.map(t => {
    const area = areas.find(a => a.id === t.areaId);
    const days = daysSince(t.touchedAt || t.updatedAt || t.createdAt);
    return `[${t.status}] "${t.name}" (priority:${t.priority}, due:${t.due||"none"}, area:${area?.name||"none"}, last_touched:${days}d_ago${isForgotten(t) ? ", FORGOTTEN" : ""})`;
  }).join("\n");

  const pData = projects.map(p => {
    const area = areas.find(a => a.id === p.areaId);
    const days = daysSince(p.touchedAt || p.updatedAt || p.createdAt);
    return `[${p.status}] "${p.name}" (priority:${p.priority}, due:${p.due||"none"}, area:${area?.name||"none"}, last_touched:${days}d_ago${isForgotten(p) ? ", FORGOTTEN" : ""})`;
  }).join("\n");

  try {
    const r = await fetch(getProxyUrl() + "/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        messages: [{ role: "user", content: `You are a second-brain daily digest assistant. Today is ${today}. Analyse this person's tasks and projects. Be direct and actionable.

Rules:
- "forgotten" = status != Complete AND last touched > 7 days ago
- "incoming" = due within 3 days
- "stalled" = On Hold for > 14 days

TASKS:
${tData || "none"}

PROJECTS:
${pData || "none"}

Return ONLY valid JSON (no markdown):
{
  "greeting": "short motivational one-liner",
  "today_focus": ["3-5 most important things for today"],
  "forgotten": [{"name": "item name", "days": number_of_days_untouched}],
  "incoming": [{"name": "item name", "due": "date", "priority": "level"}],
  "stalled": [{"name": "item name", "days_on_hold": number}],
  "wins": ["recently completed items"],
  "risk_areas": ["areas that need attention"],
  "recommendation": "one paragraph strategic recommendation"
}` }]
      })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    return JSON.parse((d.content?.[0]?.text || "{}").replace(/```json|```/g, "").trim());
  } catch (e) { console.error("AI digest error:", e); window._lastAiError = e.message; return null; }
}

async function aiProposeProjects(notes, areas) {
  const apiKey = getApiKey();
  if (!apiKey) return [];
  const unlinked = notes.filter(n => !n.extractedIds || n.extractedIds.length === 0).slice(-20);
  if (unlinked.length < 3) return [];

  const noteCtx = unlinked.map(n => `[${n.createdAt}] ${n.rawText.slice(0, 200)}`).join("\n");
  const areaCtx = areas.map(a => `${a.name}(id:${a.id})`).join(", ");

  try {
    const r = await fetch(getProxyUrl() + "/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: `You are a second-brain project proposer. Look at these recent unlinked notes and identify recurring themes (3+ notes on similar subject) that should become a Project.

Areas: ${areaCtx}
Notes:
${noteCtx}

If you find recurring themes, return JSON array. If not confident, return empty array [].
[{"suggestedName": "project name", "areaId": "area-id", "evidenceNoteIds": [], "themeSummary": "why this is a project", "confidence": 0.0-1.0}]

Return ONLY valid JSON array (no markdown).` }]
      })
    });
    const d = await r.json();
    if (d.error) return [];
    return JSON.parse((d.content?.[0]?.text || "[]").replace(/```json|```/g, "").trim());
  } catch (e) { console.error("AI propose error:", e); return []; }
}

// ============================================================
// COMPONENTS
// ============================================================
const Badge = ({ children, color, s = {} }) => (
  <span style={{ display:"inline-flex", alignItems:"center", padding:"3px 10px", borderRadius:2, fontSize:11, fontWeight:600, color, background:`${color}15`, whiteSpace:"nowrap", gap:4, border:`1px solid ${color}30`, ...s }}>{children}</span>
);

function Btn({ children, onClick, color = "var(--magenta)", outline, small, disabled, style = {} }) {
  return <button onClick={onClick} disabled={disabled} style={{ padding: small ? "6px 14px" : "10px 20px", borderRadius: 2, border: outline ? `1.5px solid ${color}` : "1.5px solid transparent", background: outline ? "transparent" : color, color: outline ? color : "#fff", fontSize: small ? 12 : 13, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", transition: "all 0.15s", letterSpacing: 0.3, opacity: disabled ? 0.5 : 1, fontFamily: "var(--font-ui)", ...style }}>{children}</button>;
}

function NavItem({ icon, label, active, onClick, badge }) {
  return (
    <button onClick={onClick} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 16px", borderRadius:2, border:"none", background: active ? "rgba(255,46,147,0.12)" : "transparent", color: active ? "var(--magenta)" : "var(--muted)", fontSize:13, fontWeight: active ? 700 : 500, cursor:"pointer", width:"100%", textAlign:"left", transition:"all 0.15s", position:"relative", fontFamily:"var(--font-ui)", borderLeft: active ? "2px solid var(--magenta)" : "2px solid transparent" }}>
      <span style={{ fontSize:16 }}>{icon}</span>{label}
      {badge > 0 && <span style={{ marginLeft:"auto", background: active ? "rgba(255,46,147,0.25)" : "rgba(255,255,255,0.06)", color: active ? "var(--magenta)" : "var(--muted)", fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:2, fontFamily:"var(--font-mono)" }}>{badge}</span>}
    </button>
  );
}

function Donut({ size = 120, stroke = 14, segments, center, sub }) {
  const r = (size - stroke) / 2, c = 2 * Math.PI * r;
  let offset = 0;
  return (
    <div style={{ position:"relative", width:size, height:size }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--elevated)" strokeWidth={stroke} />
        {segments.map((seg, i) => {
          const dash = (seg.pct / 100) * c;
          const o = offset; offset += dash;
          return <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={seg.color} strokeWidth={stroke} strokeDasharray={`${dash} ${c - dash}`} strokeDashoffset={-o} strokeLinecap="butt" style={{ transition:"all 0.6s ease" }} />;
        })}
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
        <div style={{ fontSize: size * 0.22, fontWeight:800, color:"var(--text)" }}>{center}</div>
        {sub && <div style={{ fontSize: size * 0.1, color:"var(--muted)", fontWeight:600 }}>{sub}</div>}
      </div>
    </div>
  );
}

function Toast({ message, type = "info", onDismiss }) {
  const colors = { info: "var(--cyan)", error: "var(--magenta)", success: "var(--success)", warning: "var(--warning)" };
  useEffect(() => { const t = setTimeout(onDismiss, 4000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:"fixed", bottom:24, right:80, background:"var(--elevated)", border:`1px solid ${colors[type]}40`, color:"var(--text)", padding:"12px 20px", borderRadius:2, fontSize:13, zIndex:9999, maxWidth:400, boxShadow:`0 0 20px ${colors[type]}20`, fontFamily:"var(--font-mono)", display:"flex", alignItems:"center", gap:10 }}>
      <span style={{ color:colors[type], fontSize:16 }}>{type === "error" ? "✕" : type === "success" ? "✓" : "●"}</span>
      {message}
    </div>
  );
}

// ============================================================
// CAPTURE MODAL
// ============================================================
function CaptureModal({ onCommit, onClose }) {
  const [text, setText] = useState("");
  const ref = useRef(null);
  useEffect(() => { ref.current?.focus(); }, []);

  const handleKey = (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
      e.preventDefault();
      if (text.trim()) onCommit(text.trim());
    }
    if (e.key === "Escape") onClose();
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:5000, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(20px)", background:"rgba(7,7,11,0.85)" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width:"100%", maxWidth:720, padding:40 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:24 }}>
          <div style={{ width:8, height:8, borderRadius:4, background:"var(--magenta)", boxShadow:"0 0 12px var(--magenta)" }} />
          <span style={{ fontFamily:"var(--font-mono)", fontSize:12, color:"var(--muted)" }}>MIND DUMP</span>
          <span style={{ fontFamily:"var(--font-mono)", fontSize:11, color:"var(--muted)", marginLeft:"auto" }}>⌘↵ to commit</span>
        </div>
        <textarea
          ref={ref}
          value={text}
          onChange={e => setText(e.target.value)}
          onKeyDown={handleKey}
          placeholder="Dump your thoughts here..."
          style={{
            width:"100%", minHeight:200, padding:"20px 24px", background:"var(--surface)", border:"1px solid var(--hairline)",
            borderRadius:2, color:"var(--text)", fontSize:15, fontFamily:"var(--font-mono)", lineHeight:1.8, resize:"vertical",
            outline:"none", boxSizing:"border-box"
          }}
        />
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:16 }}>
          <span style={{ fontFamily:"var(--font-mono)", fontSize:11, color:"var(--muted)" }}>
            {text.trim().split("\n").filter(l => l.trim()).length} lines
          </span>
          <div style={{ display:"flex", gap:8 }}>
            <Btn small outline color="var(--muted)" onClick={onClose}>Cancel</Btn>
            <Btn small onClick={() => text.trim() && onCommit(text.trim())} disabled={!text.trim()}>⚡ Commit</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// REVIEW CARD
// ============================================================
function ReviewCard({ result, areas, projects, onAccept, onDismiss }) {
  const [items, setItems] = useState((result.tasks || []).map((t, i) => ({ ...t, _id: uid(), _selected: true })));
  const edit = (id, k, v) => setItems(prev => prev.map(x => x._id === id ? { ...x, [k]: v } : x));
  const toggle = (id) => setItems(prev => prev.map(x => x._id === id ? { ...x, _selected: !x._selected } : x));

  return (
    <div style={{ position:"fixed", bottom:0, left:220, right:60, zIndex:4000, background:"var(--surface)", borderTop:"1px solid var(--magenta)30", padding:"20px 28px", maxHeight:"50vh", overflowY:"auto", boxShadow:"0 -10px 40px rgba(0,0,0,0.5)" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div>
          <div style={{ fontSize:14, fontWeight:700, color:"var(--text)" }}>AI Extracted — {items.length} tasks</div>
          {result.summary && <div style={{ fontSize:12, color:"var(--muted)", fontFamily:"var(--font-mono)", marginTop:2 }}>{result.summary}</div>}
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <Btn small outline color="var(--muted)" onClick={onDismiss}>Discard</Btn>
          <Btn small color="var(--success)" onClick={() => onAccept(items.filter(i => i._selected))}>Accept Selected ({items.filter(i => i._selected).length})</Btn>
        </div>
      </div>
      {items.map(item => {
        const area = areas.find(a => a.id === item.areaId);
        const conf = item.confidence || 0;
        return (
          <div key={item._id} style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"12px 14px", background:"var(--elevated)", border:`1px solid ${item._selected ? "var(--magenta)30" : "var(--hairline)"}`, borderRadius:2, marginBottom:6, opacity: item._selected ? 1 : 0.5, transition:"all 0.15s" }}>
            <button onClick={() => toggle(item._id)} style={{ width:20, height:20, borderRadius:2, border:`2px solid ${item._selected ? "var(--magenta)" : "var(--muted)"}`, background: item._selected ? "var(--magenta)" : "transparent", color:"#fff", fontSize:12, cursor:"pointer", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", marginTop:2 }}>{item._selected ? "✓" : ""}</button>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <input value={item.name} onChange={e => edit(item._id, "name", e.target.value)} style={{ flex:1, fontSize:13, fontWeight:600, background:"transparent", border:"none", color:"var(--text)", outline:"none", fontFamily:"var(--font-ui)" }} />
                <div style={{ width:8, height:8, borderRadius:4, background: conf >= 0.8 ? "var(--success)" : conf >= 0.6 ? "var(--warning)" : "var(--magenta)", boxShadow: conf < 0.6 ? "0 0 8px var(--magenta)" : "none" }} title={`Confidence: ${Math.round(conf * 100)}%`} />
              </div>
              {item.sourceSpan && <div style={{ fontSize:11, color:"var(--muted)", fontFamily:"var(--font-mono)", marginBottom:6, fontStyle:"italic" }}>"{item.sourceSpan}"</div>}
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {area && <Badge color={area.color}>{area.icon} {area.name}</Badge>}
                <Badge color={PC[item.priority]}>{item.priority}</Badge>
                <Badge color={EC[item.effort || "M"]}>{item.effort || "M"}</Badge>
                {item.due && <Badge color="var(--muted)">📅 {fmt(item.due)}</Badge>}
              </div>
            </div>
          </div>
        );
      })}
      {(result.thoughts || []).length > 0 && (
        <div style={{ marginTop:12 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"var(--muted)", fontFamily:"var(--font-mono)", marginBottom:6 }}>THOUGHTS</div>
          {result.thoughts.map((t, i) => <div key={i} style={{ padding:"8px 12px", background:"var(--elevated)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:4, fontSize:12, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>💭 {t}</div>)}
        </div>
      )}
    </div>
  );
}

// ============================================================
// TIMELINE SPINE
// ============================================================
function TimelineSpine({ notes, onSelect }) {
  const today = new Date().toISOString().slice(0, 10);
  const todayNotes = notes.filter(n => n.createdAt && n.createdAt.slice(0, 10) === today).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  return (
    <div style={{ position:"fixed", right:0, top:0, bottom:0, width:60, background:"var(--surface)", borderLeft:"1px solid var(--hairline)", zIndex:100, display:"flex", flexDirection:"column", alignItems:"center", paddingTop:20, overflowY:"auto" }}>
      <div style={{ fontFamily:"var(--font-mono)", fontSize:9, color:"var(--muted)", marginBottom:12, transform:"rotate(-90deg)", whiteSpace:"nowrap", transformOrigin:"center center" }}>TODAY</div>
      <div style={{ width:1, height:12, background:"var(--hairline)", marginBottom:8 }} />
      {todayNotes.map((n, i) => {
        const mins = Math.floor((Date.now() - new Date(n.createdAt).getTime()) / 60000);
        const glow = Math.max(0.3, 1 - mins / 480);
        return (
          <div key={n.id} onClick={() => onSelect(n)} style={{ cursor:"pointer", marginBottom:12, position:"relative", display:"flex", alignItems:"center", justifyContent:"center" }} title={n.rawText.slice(0, 80)}>
            <div style={{ width: 8 + glow * 6, height: 8 + glow * 6, borderRadius:"50%", background:"var(--magenta)", opacity: glow, boxShadow:`0 0 ${glow * 12}px var(--magenta)`, transition:"all 0.3s" }} />
          </div>
        );
      })}
      {todayNotes.length === 0 && <div style={{ fontFamily:"var(--font-mono)", fontSize:9, color:"var(--muted)", textAlign:"center", padding:"0 4px", marginTop:20, opacity:0.5 }}>no captures yet</div>}
    </div>
  );
}

          {linked.sort((a, b) => a.status === "Complete" ? 1 : b.status === "Complete" ? -1 : 0).map(t => <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 12px", borderRadius:2, background:"var(--elevated)", border:"1px solid var(--hairline)", marginBottom:4 }}>
