// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [data, setData] = useState(loadData);
  const { notes, tasks, projects, areas, digests, proposals } = data;
  const [view, setView] = useState("capture");
  const [panel, setPanel] = useState(null);
  const [showCapture, setShowCapture] = useState(false);
  const [review, setReview] = useState(null);
  const [toast, setToast] = useState(null);
  const [calMonth, setCalMonth] = useState(new Date());
  const [dragTask, setDragTask] = useState(null);
  const [briefing, setBriefing] = useState(null);
  const [briefLoading, setBriefLoading] = useState(false);
  const [searchQ, setSearchQ] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [apiKeyVal, setApiKeyVal] = useState(localStorage.getItem(API_KEY_KEY) || "");
  const [proxyVal, setProxyVal] = useState(localStorage.getItem(PROXY_KEY) || "");
  const [testResult, setTestResult] = useState(null);
  const [testing, setTesting] = useState(false);
  const saveKey = (v) => { const clean = v.trim(); setApiKeyVal(clean); localStorage.setItem(API_KEY_KEY, clean); };
  const saveProxy = (v) => { setProxyVal(v); localStorage.setItem(PROXY_KEY, v.trim()); };

  // Persistence
  useEffect(() => { saveData(data); }, [data]);
  const update = (key, fn) => setData(prev => ({ ...prev, [key]: typeof fn === "function" ? fn(prev[key]) : fn }));

  // Global ⌘K
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); setShowCapture(true); }
    };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, []);

  // Load digest cache
  useEffect(() => {
    try {
      const cached = localStorage.getItem("synapse-digest");
      if (cached) {
        const cb = JSON.parse(cached);
        setBriefing(cb.data);
        const aestNow = new Date(Date.now() + 10 * 3600000);
        const cacheDate = new Date(new Date(cb.time).getTime() + 10 * 3600000).toISOString().slice(0, 10);
        const todayDate = aestNow.toISOString().slice(0, 10);
        if (todayDate !== cacheDate && aestNow.getUTCHours() >= 6 && localStorage.getItem(API_KEY_KEY)) {
          refreshDigest();
        }
      }
    } catch(e) {}
  }, []);

  const refreshDigest = async () => {
    setBriefLoading(true);
    const r = await aiDigest(tasks, projects, areas);
    if (r) { setBriefing(r); localStorage.setItem("synapse-digest", JSON.stringify({ data: r, time: now() })); }
    setBriefLoading(false);
  };

  // Capture commit
  const handleCapture = async (rawText) => {
    setShowCapture(false);
    // Persist note FIRST
    const note = { id: uid(), createdAt: now(), updatedAt: now(), touchedAt: now(), rawText, source: "capture", processed: false, extractedIds: [], areaIds: [] };
    update("notes", prev => [note, ...prev]);
    setToast({ message: "Note saved", type: "success" });

    // AI parse
    setAiLoading(true);
    const result = await aiParseCapture(rawText, areas, projects, notes.slice(0, 5));
    setAiLoading(false);

    if (result && result.tasks && result.tasks.length > 0) {
      setReview(result);
    } else if (!result) {
      setToast({ message: "AI error: " + (window._lastAiError || "unavailable") + " — note saved as raw dump", type: "warning" });
    } else {
      setToast({ message: "No tasks extracted — note saved", type: "info" });
    }

    // Project proposals (background)
    if (localStorage.getItem(API_KEY_KEY)) {
      const props = await aiProposeProjects([note, ...notes], areas);
      if (props && props.length > 0) {
        update("proposals", prev => [...props.map(p => ({ ...p, id: uid(), status: "pending", createdAt: now() })), ...prev]);
      }
    }
  };

  // Accept reviewed tasks
  const handleAcceptTasks = (selectedItems) => {
    const newTasks = selectedItems.map(item => ({
      id: uid(), name: item.name, projectId: item.projectId || null, areaId: item.areaId || areas[0]?.id,
      status: "Not Started", priority: item.priority || "Medium", effort: item.effort || "M",
      due: item.due || null, recurrence: null, notes: "",
      sourceNoteId: notes[0]?.id || null, createdAt: now(), updatedAt: now(), touchedAt: now(),
      aiConfidence: item.confidence, aiProposed: true
    }));
    update("tasks", prev => [...newTasks, ...prev]);
    // Update note
    if (notes[0]) {
      update("notes", prev => prev.map((n, i) => i === 0 ? { ...n, processed: true, extractedIds: newTasks.map(t => t.id) } : n));
    }
    setReview(null);
    setToast({ message: `${newTasks.length} tasks created`, type: "success" });
  };

  // CRUD helpers
  const saveTask = (t) => update("tasks", prev => prev.map(x => x.id === t.id ? t : x));
  const deleteTask = (id) => { update("tasks", prev => prev.filter(x => x.id !== id)); if (panel?.item?.id === id) setPanel(null); };
  const addTask = (t) => { const n = { ...t, id: uid() }; update("tasks", prev => [n, ...prev]); return n; };
  const saveProject = (p) => update("projects", prev => prev.map(x => x.id === p.id ? p : x));
  const deleteProject = (id) => { update("projects", prev => prev.filter(x => x.id !== id)); update("tasks", prev => prev.map(t => t.projectId === id ? { ...t, projectId: null } : t)); setPanel(null); };
  const addProject = (p) => { const n = { ...p, id: uid(), createdAt: now(), updatedAt: now(), touchedAt: now() }; update("projects", prev => [n, ...prev]); return n; };

  // Complete task with recurrence
  const completeTask = (t) => {
    const updated = touchNow({ ...t, status: "Complete" });
    update("tasks", prev => {
      const list = prev.map(x => x.id === t.id ? updated : x);
      if (t.recurrence && t.status !== "Complete") {
        const nextDue = getNextDue(t.due, t.recurrence);
        if (nextDue && (!t.recurrenceEnd || nextDue <= t.recurrenceEnd)) {
          return [...list, { ...t, id: uid(), status: "Not Started", due: nextDue, createdAt: now(), updatedAt: now(), touchedAt: now() }];
        }
      }
      return list;
    });
  };

  const handleCalDrop = (taskId, newDay) => {
    const yr = calMonth.getFullYear(), mn = calMonth.getMonth();
    const newDate = yr + "-" + String(mn + 1).padStart(2, "0") + "-" + String(newDay).padStart(2, "0");
    update("tasks", prev => prev.map(x => x.id === taskId ? touchNow({ ...x, due: newDate }) : x));
    setDragTask(null);
  };

  // Sync panel
  useEffect(() => {
    if (panel) {
      const src = panel.type === "project" ? projects : tasks;
      const u = src.find(x => x.id === panel.item.id);
      if (u && JSON.stringify(u) !== JSON.stringify(panel.item)) setPanel({ ...panel, item: u });
    }
  }, [projects, tasks]);

  const inboxCount = proposals.filter(p => p.status === "pending").length;
  const forgottenCount = tasks.filter(t => isForgotten(t)).length;

  // ============================================================
  // RENDER
  // ============================================================
  return (
    <div style={{ display:"flex", height:"100vh", overflow:"hidden" }}>
      {panel && <div onClick={() => setPanel(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.3)", zIndex:999 }} />}
      {showCapture && <CaptureModal onCommit={handleCapture} onClose={() => setShowCapture(false)} />}
      {review && <ReviewCard result={review} areas={areas} projects={projects} onAccept={handleAcceptTasks} onDismiss={() => setReview(null)} />}
      {toast && <Toast message={toast.message} type={toast.type} onDismiss={() => setToast(null)} />}

      {/* NAV SIDEBAR */}
      <div style={{ width:220, background:"var(--surface)", borderRight:"1px solid var(--hairline)", padding:"20px 12px", display:"flex", flexDirection:"column", flexShrink:0, overflowY:"auto" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"0 8px", marginBottom:24 }}>
          <div style={{ width:36, height:36, borderRadius:2, background:"linear-gradient(135deg, var(--magenta), #9B6DFF)", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:16, fontWeight:800 }}>🧠</div>
          <div><div style={{ fontSize:14, fontWeight:800 }}>Synapse</div><div style={{ fontSize:10, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>second brain</div></div>
        </div>

        <button onClick={() => setShowCapture(true)} style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 16px", borderRadius:2, border:"1px solid var(--magenta)40", background:"rgba(255,46,147,0.08)", color:"var(--magenta)", fontSize:13, fontWeight:600, cursor:"pointer", width:"100%", textAlign:"left", marginBottom:16, fontFamily:"var(--font-ui)" }}>
          <span>⚡</span> Capture <span style={{ marginLeft:"auto", fontSize:10, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>⌘K</span>
        </button>

        <div style={{ fontSize:10, fontWeight:700, color:"var(--muted)", textTransform:"uppercase", letterSpacing:1, padding:"0 8px", marginBottom:6, fontFamily:"var(--font-mono)" }}>Views</div>
        <NavItem icon="⚡" label="Capture" active={view === "capture"} onClick={() => setView("capture")} />
        <NavItem icon="📡" label="Stream" active={view === "stream"} onClick={() => setView("stream")} />
        <NavItem icon="📝" label="Notes" active={view === "notes"} onClick={() => setView("notes")} badge={notes.length} />
        <NavItem icon="☑️" label="Tasks" active={view === "tasks"} onClick={() => setView("tasks")} badge={tasks.filter(t => t.status !== "Complete").length} />
        <NavItem icon="📂" label="Projects" active={view === "projects"} onClick={() => setView("projects")} badge={projects.length} />
        <NavItem icon="📌" label="Board" active={view === "board"} onClick={() => setView("board")} />
        <NavItem icon="📆" label="Calendar" active={view === "calendar"} onClick={() => setView("calendar")} />

        <div style={{ fontSize:10, fontWeight:700, color:"var(--muted)", textTransform:"uppercase", letterSpacing:1, padding:"0 8px", margin:"16px 0 6px", fontFamily:"var(--font-mono)" }}>Intelligence</div>
        <NavItem icon="📊" label="Dashboard" active={view === "dashboard"} onClick={() => setView("dashboard")} />
        <NavItem icon="🔮" label="Digest" active={view === "digest"} onClick={() => setView("digest")} badge={forgottenCount} />
        <NavItem icon="📥" label="Inbox" active={view === "inbox"} onClick={() => setView("inbox")} badge={inboxCount} />

        <div style={{ flex:1 }} />
        <NavItem icon="⚙️" label="Settings" active={view === "settings"} onClick={() => setView("settings")} />
      </div>

      {/* MAIN CONTENT */}
      <div style={{ flex:1, padding:"24px 28px", overflowY:"auto", marginRight:60 }}>

        {/* ========== CAPTURE VIEW ========== */}
        {view === "capture" && <>
          <div style={{ marginBottom:8 }}>
            <h1 style={{ fontSize:28, fontWeight:800, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Capture</h1>
            <p style={{ fontSize:13, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>⌘K to dump from anywhere. Your thoughts are saved instantly.</p>
          </div>
          <div onClick={() => setShowCapture(true)} style={{ cursor:"pointer", background:"var(--surface)", border:"1px dashed var(--magenta)40", borderRadius:2, padding:"60px 40px", textAlign:"center", marginTop:24, transition:"all 0.2s" }}>
            <div style={{ fontSize:48, marginBottom:16 }}>⚡</div>
            <div style={{ fontSize:18, fontWeight:700, color:"var(--text)", marginBottom:8 }}>Start a mind dump</div>
            <div style={{ fontSize:13, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>Click here or press ⌘K to capture</div>
            {aiLoading && <div style={{ marginTop:16, color:"var(--cyan)", fontFamily:"var(--font-mono)", fontSize:12 }}>● AI processing...</div>}
          </div>
          {notes.length > 0 && <div style={{ marginTop:32 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"var(--muted)", fontFamily:"var(--font-mono)", marginBottom:12 }}>RECENT CAPTURES</div>
            {notes.slice(0, 5).map(n => (
              <div key={n.id} style={{ padding:"14px 16px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:6 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                  <span style={{ fontFamily:"var(--font-mono)", fontSize:11, color:"var(--cyan)" }}>{fmtFull(n.createdAt)}</span>
                  {n.extractedIds.length > 0 && <Badge color="var(--success)">→ {n.extractedIds.length} tasks</Badge>}
                </div>
                <div style={{ fontSize:13, color:"var(--text)", lineHeight:1.6, fontFamily:"var(--font-mono)", whiteSpace:"pre-wrap" }}>{n.rawText.slice(0, 200)}{n.rawText.length > 200 ? "..." : ""}</div>
              </div>
            ))}
          </div>}
        </>}

        {/* ========== STREAM VIEW ========== */}
        {view === "stream" && <>
          <h1 style={{ fontSize:28, fontWeight:800, marginBottom:4, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Stream</h1>
          <p style={{ fontSize:13, color:"var(--muted)", fontFamily:"var(--font-mono)", marginBottom:24 }}>Everything, reverse-chronological</p>
          {(() => {
            const allItems = [
              ...notes.map(n => ({ ...n, _type: "note", _ts: n.createdAt })),
              ...tasks.map(t => ({ ...t, _type: "task", _ts: t.createdAt })),
              ...projects.map(p => ({ ...p, _type: "project", _ts: p.createdAt })),
            ].sort((a, b) => new Date(b._ts) - new Date(a._ts));

            const grouped = {};
            allItems.forEach(item => {
              const day = item._ts ? item._ts.slice(0, 10) : "unknown";
              if (!grouped[day]) grouped[day] = [];
              grouped[day].push(item);
            });

            return Object.entries(grouped).map(([day, items]) => (
              <div key={day} style={{ marginBottom:24 }}>
                <div style={{ fontFamily:"var(--font-mono)", fontSize:11, color:"var(--muted)", marginBottom:8, padding:"4px 0", borderBottom:"1px solid var(--hairline)" }}>{day === new Date().toISOString().slice(0,10) ? "TODAY" : day}</div>
                {items.map(item => (
                  <div key={item.id} style={{ display:"flex", gap:12, padding:"10px 14px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:4, cursor: item._type !== "note" ? "pointer" : "default" }} onClick={() => { if (item._type === "task") setPanel({ type:"task", item }); if (item._type === "project") setPanel({ type:"project", item }); }}>
                    <div style={{ fontFamily:"var(--font-mono)", fontSize:11, color:"var(--cyan)", minWidth:45 }}>{fmtTime(item._ts)}</div>
                    <div style={{ width:6, height:6, borderRadius:3, background: item._type === "note" ? "var(--muted)" : item._type === "task" ? "var(--cyan)" : "var(--magenta)", marginTop:5, flexShrink:0 }} />
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, color:"var(--text)", fontWeight: item._type === "note" ? 400 : 600 }}>
                        {item._type === "note" ? item.rawText.slice(0, 120) : item.name}
                      </div>
                      <div style={{ display:"flex", gap:6, marginTop:4 }}>
                        <span style={{ fontFamily:"var(--font-mono)", fontSize:10, color:"var(--muted)" }}>{item._type}</span>
                        {item.status && <Badge color={SC[item.status]} s={{ fontSize:10, padding:"1px 6px" }}>{item.status}</Badge>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            ));
          })()}
          {notes.length === 0 && tasks.length === 0 && <div style={{ textAlign:"center", padding:"60px 0", color:"var(--muted)" }}><div style={{ fontSize:36, marginBottom:8 }}>📡</div>Stream is empty. Hit ⌘K to start capturing.</div>}
        </>}

        {/* ========== NOTES VIEW ========== */}
        {view === "notes" && <>
          <h1 style={{ fontSize:28, fontWeight:800, marginBottom:4, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Notes</h1>
          <p style={{ fontSize:13, color:"var(--muted)", fontFamily:"var(--font-mono)", marginBottom:16 }}>Raw dumps, searchable and traceable</p>
          <input value={searchQ} onChange={e => setSearchQ(e.target.value)} placeholder="Search notes..." style={{ width:"100%", maxWidth:400, padding:"10px 14px", borderRadius:2, border:"1px solid var(--hairline)", fontSize:13, background:"var(--surface)", color:"var(--text)", marginBottom:20, fontFamily:"var(--font-mono)", boxSizing:"border-box" }} />
          {notes.filter(n => !searchQ || n.rawText.toLowerCase().includes(searchQ.toLowerCase())).map(n => (
            <div key={n.id} style={{ padding:"16px 18px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <span style={{ fontFamily:"var(--font-mono)", fontSize:11, color:"var(--cyan)" }}>{fmtFull(n.createdAt)}</span>
                <div style={{ display:"flex", gap:6 }}>
                  {n.extractedIds.length > 0 && <Badge color="var(--success)">→ {n.extractedIds.length} tasks extracted</Badge>}
                  <Badge color="var(--muted)">{n.source}</Badge>
                </div>
              </div>
              <div style={{ fontSize:13, color:"var(--text)", lineHeight:1.8, fontFamily:"var(--font-mono)", whiteSpace:"pre-wrap" }}>{n.rawText}</div>
              {n.extractedIds.length > 0 && <div style={{ marginTop:10, paddingTop:10, borderTop:"1px solid var(--hairline)" }}>
                <div style={{ fontSize:10, color:"var(--muted)", fontFamily:"var(--font-mono)", marginBottom:4 }}>EXTRACTED TASKS</div>
                {tasks.filter(t => n.extractedIds.includes(t.id)).map(t => (
                  <div key={t.id} onClick={() => setPanel({ type:"task", item: t })} style={{ fontSize:12, color:"var(--cyan)", cursor:"pointer", padding:"2px 0" }}>→ {t.name}</div>
                ))}
              </div>}
              <div style={{ display:"flex", justifyContent:"flex-end", marginTop:8 }}>
                <button onClick={() => { update("notes", prev => prev.filter(x => x.id !== n.id)); }} style={{ fontSize:11, color:"var(--muted)", background:"none", border:"none", cursor:"pointer" }}>delete</button>
              </div>
            </div>
          ))}
          {notes.length === 0 && <div style={{ textAlign:"center", padding:"60px 0", color:"var(--muted)" }}><div style={{ fontSize:36, marginBottom:8 }}>📝</div>No notes yet. Hit ⌘K to capture your first thought.</div>}
        </>}

        {/* ========== TASKS VIEW ========== */}
        {view === "tasks" && <>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <div>
              <h1 style={{ fontSize:28, fontWeight:800, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Tasks</h1>
              <p style={{ fontSize:13, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>{tasks.filter(t => t.status !== "Complete").length} active · {forgottenCount} forgotten</p>
            </div>
            <Btn small onClick={() => { const t = addTask({ name:"New Task", projectId:null, areaId:areas[0]?.id, status:"Not Started", priority:"Medium", effort:"M", due:null, notes:"", createdAt:now(), updatedAt:now(), touchedAt:now(), recurrence:null }); setPanel({ type:"task", item: t }); }}>+ Task</Btn>
          </div>
          {tasks.sort((a, b) => {
            if (a.status === "Complete" && b.status !== "Complete") return 1;
            if (a.status !== "Complete" && b.status === "Complete") return -1;
            const aF = isForgotten(a), bF = isForgotten(b);
            if (aF && !bF) return -1;
            if (!aF && bF) return 1;
            return new Date(b.touchedAt || b.createdAt) - new Date(a.touchedAt || a.createdAt);
          }).map(t => {
            const area = areas.find(a => a.id === t.areaId);
            const forgotten = isForgotten(t);
            return (
              <div key={t.id} onClick={() => setPanel({ type:"task", item: t })} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", background:"var(--surface)", border:`1px solid ${forgotten ? "var(--warning)30" : "var(--hairline)"}`, borderRadius:2, marginBottom:4, cursor:"pointer", transition:"all 0.15s" }}>
                <button onClick={e => { e.stopPropagation(); if (t.status !== "Complete") completeTask(t); else saveTask(touchNow({ ...t, status:"Not Started" })); }} style={{ width:22, height:22, borderRadius:2, border:`2px solid ${SC[t.status]}`, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, cursor:"pointer", background: t.status === "Complete" ? SC[t.status] : "transparent", color: t.status === "Complete" ? "#000" : "transparent" }}>{t.status === "Complete" ? "✓" : ""}</button>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600, textDecoration: t.status === "Complete" ? "line-through" : "none", color: t.status === "Complete" ? "var(--muted)" : "var(--text)" }}>{t.name}</div>
                  <div style={{ display:"flex", gap:6, marginTop:4, alignItems:"center" }}>
                    {area && <Badge color={area.color} s={{ fontSize:10, padding:"1px 6px" }}>{area.icon} {area.name}</Badge>}
                    {t.due && <span style={{ fontFamily:"var(--font-mono)", fontSize:10, color: t.due < new Date().toISOString().slice(0,10) && t.status !== "Complete" ? "var(--magenta)" : "var(--muted)" }}>📅 {fmt(t.due)}</span>}
                    {forgotten && <Badge color="var(--warning)" s={{ fontSize:10, padding:"1px 6px" }}>⚠ {daysSince(t.touchedAt || t.createdAt)}d untouched</Badge>}
                    {t.sourceNoteId && <span style={{ fontFamily:"var(--font-mono)", fontSize:10, color:"var(--cyan)" }}>→ note</span>}
                  </div>
                </div>
                <span style={{ width:8, height:8, borderRadius:4, background:PC[t.priority], flexShrink:0 }} title={t.priority} />
                <span style={{ fontSize:11, fontWeight:700, color:EC[t.effort], fontFamily:"var(--font-mono)" }}>{t.effort}</span>
              </div>
            );
          })}
          {tasks.length === 0 && <div style={{ textAlign:"center", padding:"60px 0", color:"var(--muted)" }}>No tasks yet. Capture a mind dump to get started.</div>}
        </>}

        {/* ========== PROJECTS VIEW ========== */}
        {view === "projects" && <>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <div>
              <h1 style={{ fontSize:28, fontWeight:800, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Projects</h1>
              <p style={{ fontSize:13, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>{projects.filter(p => p.status !== "Complete").length} active</p>
            </div>
            <Btn small onClick={() => { const p = addProject({ name:"New Project", areaId:areas[0]?.id, status:"Not Started", priority:"Medium", effort:"M", due:null, notes:"" }); setPanel({ type:"project", item: p }); }}>+ Project</Btn>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:12 }}>
            {projects.map(p => {
              const area = areas.find(a => a.id === p.areaId);
              const linked = tasks.filter(t => t.projectId === p.id);
              const done = linked.filter(t => t.status === "Complete").length;
              const prog = linked.length ? Math.round((done / linked.length) * 100) : 0;
              return (
                <div key={p.id} onClick={() => setPanel({ type:"project", item: p })} style={{ padding:"18px 20px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2, cursor:"pointer", transition:"all 0.15s", borderLeft:`3px solid ${area?.color || "var(--muted)"}` }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                    <div style={{ fontSize:15, fontWeight:700 }}>{p.name}</div>
                    <Badge color={SC[p.status]} s={{ fontSize:10 }}>{p.status}</Badge>
                  </div>
                  {area && <Badge color={area.color} s={{ fontSize:10, marginBottom:8 }}>{area.icon} {area.name}</Badge>}
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:10 }}>
                    <div style={{ flex:1, height:4, borderRadius:2, background:"var(--elevated)", overflow:"hidden" }}><div style={{ width:`${prog}%`, height:"100%", background:area?.color || "var(--cyan)", transition:"width 0.5s" }} /></div>
                    <span style={{ fontFamily:"var(--font-mono)", fontSize:10, color:"var(--muted)" }}>{done}/{linked.length}</span>
                  </div>
                  {p.due && <div style={{ fontFamily:"var(--font-mono)", fontSize:10, color:"var(--muted)", marginTop:8 }}>Due {fmt(p.due)}</div>}
                </div>
              );
            })}
          </div>
          {projects.length === 0 && <div style={{ textAlign:"center", padding:"60px 0", color:"var(--muted)" }}>No projects yet. They'll appear from AI proposals or manual creation.</div>}
        </>}

        {/* ========== BOARD VIEW ========== */}
        {view === "board" && <>
          <h1 style={{ fontSize:28, fontWeight:800, marginBottom:20, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Board</h1>
          <div style={{ display:"grid", gridTemplateColumns:`repeat(${STATUSES.length}, 1fr)`, gap:12, minHeight:"60vh" }}>
            {STATUSES.map(status => (
              <div key={status} onDragOver={e => e.preventDefault()} onDrop={e => { const id = e.dataTransfer.getData("taskId"); if (id) saveTask(touchNow({ ...tasks.find(t => t.id === id), status })); }} style={{ background:"var(--surface)", borderRadius:2, border:"1px solid var(--hairline)", padding:12 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12, padding:"0 4px" }}>
                  <div style={{ width:8, height:8, borderRadius:4, background:SC[status] }} />
                  <span style={{ fontSize:12, fontWeight:700, color:"var(--text)" }}>{status}</span>
                  <span style={{ fontSize:10, color:"var(--muted)", fontFamily:"var(--font-mono)", marginLeft:"auto" }}>{tasks.filter(t => t.status === status).length}</span>
                </div>
                {tasks.filter(t => t.status === status).map(t => {
                  const area = areas.find(a => a.id === t.areaId);
                  return (
                    <div key={t.id} draggable onDragStart={e => e.dataTransfer.setData("taskId", t.id)} onClick={() => setPanel({ type:"task", item: t })} style={{ padding:"10px 12px", background:"var(--elevated)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:6, cursor:"grab", fontSize:12 }}>
                      <div style={{ fontWeight:600, marginBottom:4, color:"var(--text)" }}>{t.name}</div>
                      <div style={{ display:"flex", gap:4, alignItems:"center" }}>
                        <span style={{ width:6, height:6, borderRadius:3, background:PC[t.priority] }} />
                        {area && <span style={{ fontSize:10, color:area.color }}>{area.icon}</span>}
                        {t.due && <span style={{ fontSize:10, color:"var(--muted)", fontFamily:"var(--font-mono)", marginLeft:"auto" }}>{fmt(t.due)}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </>}

        {/* ========== CALENDAR VIEW ========== */}
        {view === "calendar" && (() => {
          const yr = calMonth.getFullYear(), mn = calMonth.getMonth();
          const fd = new Date(yr, mn, 1).getDay();
          const dim = new Date(yr, mn + 1, 0).getDate();
          const today = new Date().toISOString().slice(0, 10);
          const sp = (fd + 6) % 7;
          const days = [];
          for (let i = 0; i < sp; i++) days.push(null);
          for (let i = 1; i <= dim; i++) days.push(i);
          while (days.length % 7 !== 0) days.push(null);

          const allItems = [
            ...tasks.filter(t => t.due && t.status !== "Complete").map(t => ({ ...t, itemType: "task" })),
            ...tasks.filter(t => t.recurrence && t.due && t.status !== "Complete").flatMap(t => {
              const endStr = yr + "-" + String(mn + 2).padStart(2, "0") + "-01";
              return generateGhostDates(t.due, t.recurrence, endStr, 5).map(d => ({ ...t, due: d, itemType: "ghost", ghostParent: t.id }));
            }),
          ];

          return <>
            <h1 style={{ fontSize:28, fontWeight:800, marginBottom:20, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Calendar</h1>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <Btn small outline color="var(--muted)" onClick={() => setCalMonth(new Date(yr, mn - 1, 1))}>←</Btn>
              <span style={{ fontWeight:700 }}>{calMonth.toLocaleDateString("en-AU", { month:"long", year:"numeric" })}</span>
              <Btn small outline color="var(--muted)" onClick={() => setCalMonth(new Date(yr, mn + 1, 1))}>→</Btn>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:2 }}>
              {["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"].map(d => <div key={d} style={{ padding:"8px 4px", textAlign:"center", fontSize:11, fontWeight:600, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>{d}</div>)}
              {days.map((day, i) => {
                if (!day) return <div key={i} style={{ minHeight:80, background:"var(--surface)", borderRadius:2 }} />;
                const dateStr = yr + "-" + String(mn + 1).padStart(2, "0") + "-" + String(day).padStart(2, "0");
                const isToday = dateStr === today;
                const dayItems = allItems.filter(item => item.due === dateStr);
                return (
                  <div key={i} onDragOver={e => e.preventDefault()} onDrop={e => { const id = e.dataTransfer.getData("taskId"); if (id) handleCalDrop(id, day); }} style={{ minHeight:80, background:"var(--surface)", borderRadius:2, padding:"4px 6px", border: isToday ? "1px solid var(--magenta)40" : "1px solid var(--hairline)" }}>
                    <div style={{ fontSize:11, fontWeight: isToday ? 700 : 400, color: isToday ? "var(--magenta)" : "var(--muted)", fontFamily:"var(--font-mono)", marginBottom:4 }}>{day}</div>
                    {dayItems.slice(0, 3).map((item, j) => (
                      <div key={j} draggable={item.itemType !== "ghost"} onDragStart={e => e.dataTransfer.setData("taskId", item.id)} onClick={() => { if (item.itemType !== "ghost") setPanel({ type:"task", item }); }} style={{ fontSize:10, padding:"2px 4px", borderRadius:2, marginBottom:2, background: item.itemType === "ghost" ? "transparent" : `${PC[item.priority]}20`, color: item.itemType === "ghost" ? "var(--muted)" : "var(--text)", borderLeft: `2px solid ${item.itemType === "ghost" ? "var(--muted)" : PC[item.priority]}`, cursor: item.itemType === "ghost" ? "default" : "pointer", fontStyle: item.itemType === "ghost" ? "italic" : "normal", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.name}</div>
                    ))}
                    {dayItems.length > 3 && <div style={{ fontSize:9, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>+{dayItems.length - 3}</div>}
                  </div>
                );
              })}
            </div>
          </>;
        })()}

        {/* ========== DASHBOARD VIEW ========== */}
        {view === "dashboard" && <>
          <h1 style={{ fontSize:28, fontWeight:800, marginBottom:20, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Dashboard</h1>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(180px, 1fr))", gap:12, marginBottom:24 }}>
            {[
              { label:"Active Tasks", value: tasks.filter(t => t.status !== "Complete").length, color:"var(--cyan)" },
              { label:"Forgotten", value: forgottenCount, color:"var(--warning)" },
              { label:"Active Projects", value: projects.filter(p => p.status !== "Complete").length, color:"var(--magenta)" },
              { label:"Notes", value: notes.length, color:"var(--muted)" },
              { label:"Proposals", value: inboxCount, color:"var(--success)" },
            ].map((s, i) => (
              <div key={i} style={{ padding:"18px 20px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2 }}>
                <div style={{ fontSize:11, fontWeight:600, color:"var(--muted)", fontFamily:"var(--font-mono)", marginBottom:4 }}>{s.label}</div>
                <div style={{ fontSize:28, fontWeight:800, color:s.color }}>{s.value}</div>
              </div>
            ))}
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
            <div style={{ padding:"20px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2 }}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:12 }}>Tasks by Status</div>
              <Donut size={120} stroke={14} center={tasks.length} sub="total" segments={STATUSES.map(s => ({ pct: tasks.length ? (tasks.filter(t => t.status === s).length / tasks.length) * 100 : 0, color: SC[s] }))} />
            </div>
            <div style={{ padding:"20px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2 }}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:12 }}>By Area</div>
              {areas.map(a => {
                const count = tasks.filter(t => t.areaId === a.id && t.status !== "Complete").length;
                return (
                  <div key={a.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                    <span style={{ fontSize:12 }}>{a.icon}</span>
                    <span style={{ fontSize:12, flex:1 }}>{a.name}</span>
                    <div style={{ width:100, height:4, borderRadius:2, background:"var(--elevated)", overflow:"hidden" }}><div style={{ width:`${Math.min(100, count * 10)}%`, height:"100%", background:a.color }} /></div>
                    <span style={{ fontFamily:"var(--font-mono)", fontSize:11, color:"var(--muted)", minWidth:20, textAlign:"right" }}>{count}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {forgottenCount > 0 && <div style={{ marginTop:16, padding:"16px 20px", background:"var(--surface)", border:"1px solid var(--warning)30", borderRadius:2 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"var(--warning)", marginBottom:10 }}>⚠ Forgotten Items ({forgottenCount})</div>
            {tasks.filter(t => isForgotten(t)).slice(0, 5).map(t => (
              <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 0", borderBottom:"1px solid var(--hairline)" }}>
                <span style={{ fontSize:12, flex:1 }}>{t.name}</span>
                <span style={{ fontFamily:"var(--font-mono)", fontSize:10, color:"var(--warning)" }}>{daysSince(t.touchedAt || t.createdAt)}d</span>
                <Btn small outline color="var(--cyan)" onClick={() => saveTask(touchNow({ ...t }))}>Touch</Btn>
              </div>
            ))}
          </div>}
        </>}

        {/* ========== DIGEST VIEW ========== */}
        {view === "digest" && <>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <div>
              <h1 style={{ fontSize:28, fontWeight:800, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Daily Digest</h1>
              <p style={{ fontSize:13, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>Your AI morning briefing</p>
            </div>
            <Btn small onClick={refreshDigest} disabled={briefLoading}>{briefLoading ? "Generating..." : "🔮 Refresh"}</Btn>
          </div>

          {!briefing && !briefLoading && <div style={{ textAlign:"center", padding:"60px 0", color:"var(--muted)" }}>
            <div style={{ fontSize:36, marginBottom:8 }}>🔮</div>
            <div>Set your API key in Settings, then click Refresh to generate your first digest.</div>
          </div>}

          {briefLoading && <div style={{ textAlign:"center", padding:"60px 0" }}><div style={{ color:"var(--cyan)", fontFamily:"var(--font-mono)", fontSize:14 }}>● Generating digest...</div></div>}

          {briefing && <>
            {briefing.greeting && <div style={{ padding:"16px 20px", background:"var(--surface)", border:"1px solid var(--magenta)30", borderRadius:2, marginBottom:16, fontSize:15, fontWeight:600, color:"var(--text)" }}>{briefing.greeting}</div>}

            {briefing.today_focus && briefing.today_focus.length > 0 && <div style={{ padding:"16px 20px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:12 }}>
              <div style={{ fontSize:13, fontWeight:700, color:"var(--cyan)", marginBottom:10, fontFamily:"var(--font-mono)" }}>TODAY'S FOCUS</div>
              {briefing.today_focus.map((f, i) => <div key={i} style={{ padding:"6px 0", fontSize:13, borderBottom:"1px solid var(--hairline)" }}>→ {f}</div>)}
            </div>}

            {briefing.forgotten && briefing.forgotten.length > 0 && <div style={{ padding:"16px 20px", background:"var(--surface)", border:"1px solid var(--warning)30", borderRadius:2, marginBottom:12 }}>
              <div style={{ fontSize:13, fontWeight:700, color:"var(--warning)", marginBottom:10, fontFamily:"var(--font-mono)" }}>⚠ YOU FORGOT ABOUT...</div>
              {briefing.forgotten.map((f, i) => (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom:"1px solid var(--hairline)" }}>
                  <span style={{ flex:1, fontSize:13 }}>{f.name || f}</span>
                  {f.days && <span style={{ fontFamily:"var(--font-mono)", fontSize:10, color:"var(--warning)" }}>{f.days}d</span>}
                  <Btn small outline color="var(--cyan)" onClick={() => { const t = tasks.find(t => t.name === f.name); if (t) saveTask(touchNow({ ...t })); }}>Touch</Btn>
                </div>
              ))}
            </div>}

            {briefing.incoming && briefing.incoming.length > 0 && <div style={{ padding:"16px 20px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:12 }}>
              <div style={{ fontSize:13, fontWeight:700, color:"var(--magenta)", marginBottom:10, fontFamily:"var(--font-mono)" }}>INCOMING</div>
              {briefing.incoming.map((f, i) => <div key={i} style={{ padding:"6px 0", fontSize:13, borderBottom:"1px solid var(--hairline)" }}>{f.name || f} {f.due && <span style={{ fontFamily:"var(--font-mono)", fontSize:10, color:"var(--muted)" }}>— due {f.due}</span>}</div>)}
            </div>}

            {briefing.stalled && briefing.stalled.length > 0 && <div style={{ padding:"16px 20px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:12 }}>
              <div style={{ fontSize:13, fontWeight:700, color:"var(--muted)", marginBottom:10, fontFamily:"var(--font-mono)" }}>STALLED</div>
              {briefing.stalled.map((f, i) => <div key={i} style={{ padding:"6px 0", fontSize:13, borderBottom:"1px solid var(--hairline)" }}>{f.name || f}</div>)}
            </div>}

            {briefing.recommendation && <div style={{ padding:"16px 20px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:12 }}>
              <div style={{ fontSize:13, fontWeight:700, color:"var(--success)", marginBottom:10, fontFamily:"var(--font-mono)" }}>RECOMMENDATION</div>
              <div style={{ fontSize:13, lineHeight:1.6, color:"var(--text)" }}>{briefing.recommendation}</div>
            </div>}
          </>}
        </>}

        {/* ========== INBOX VIEW ========== */}
        {view === "inbox" && <>
          <h1 style={{ fontSize:28, fontWeight:800, marginBottom:4, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Inbox</h1>
          <p style={{ fontSize:13, color:"var(--muted)", fontFamily:"var(--font-mono)", marginBottom:20 }}>AI proposals awaiting your decision</p>

          {proposals.filter(p => p.status === "pending").map(prop => {
            const area = areas.find(a => a.id === prop.areaId);
            return (
              <div key={prop.id} style={{ padding:"18px 20px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:12 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                  <div>
                    <div style={{ fontSize:15, fontWeight:700 }}>{prop.suggestedName}</div>
                    {area && <Badge color={area.color} s={{ marginTop:4 }}>{area.icon} {area.name}</Badge>}
                  </div>
                  <div style={{ display:"flex", gap:6 }}>
                    <div style={{ width:8, height:8, borderRadius:4, background: (prop.confidence || 0) >= 0.7 ? "var(--success)" : "var(--warning)", marginTop:6 }} title={`Confidence: ${Math.round((prop.confidence || 0) * 100)}%`} />
                  </div>
                </div>
                {prop.themeSummary && <div style={{ fontSize:12, color:"var(--muted)", lineHeight:1.5, marginBottom:12 }}>{prop.themeSummary}</div>}
                <div style={{ display:"flex", gap:8 }}>
                  <Btn small color="var(--success)" onClick={() => {
                    const p = addProject({ name: prop.suggestedName, areaId: prop.areaId || areas[0]?.id, status:"Not Started", priority:"Medium", effort:"M", due:null, notes: prop.themeSummary || "", aiProposed: true, proposalEvidence: prop.evidenceNoteIds });
                    update("proposals", prev => prev.map(x => x.id === prop.id ? { ...x, status:"accepted" } : x));
                    setToast({ message: `Project "${prop.suggestedName}" created`, type:"success" });
                  }}>Create Project</Btn>
                  <Btn small outline color="var(--muted)" onClick={() => { update("proposals", prev => prev.map(x => x.id === prop.id ? { ...x, status:"dismissed" } : x)); }}>Not now</Btn>
                </div>
              </div>
            );
          })}

          {proposals.filter(p => p.status === "pending").length === 0 && <div style={{ textAlign:"center", padding:"60px 0", color:"var(--muted)" }}>
            <div style={{ fontSize:36, marginBottom:8 }}>📥</div>
            <div>No pending proposals. AI will suggest projects when it detects recurring themes in your captures.</div>
          </div>}

          {proposals.filter(p => p.status !== "pending").length > 0 && <div style={{ marginTop:24 }}>
            <div style={{ fontSize:11, fontWeight:700, color:"var(--muted)", fontFamily:"var(--font-mono)", marginBottom:8 }}>HISTORY</div>
            {proposals.filter(p => p.status !== "pending").map(prop => (
              <div key={prop.id} style={{ padding:"8px 14px", background:"var(--surface)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:4, opacity:0.5 }}>
                <span style={{ fontSize:12 }}>{prop.suggestedName}</span>
                <Badge color={prop.status === "accepted" ? "var(--success)" : "var(--muted)"} s={{ fontSize:10, marginLeft:8 }}>{prop.status}</Badge>
              </div>
            ))}
          </div>}
        </>}

        {/* ========== SETTINGS VIEW ========== */}
        {view === "settings" && <>
          <h1 style={{ fontSize:28, fontWeight:800, marginBottom:20, textShadow:"0 0 40px rgba(255,46,147,0.15)" }}>Settings</h1>

          <div style={{ background:"var(--surface)", borderRadius:2, border:"1px solid var(--hairline)", padding:"24px", maxWidth:550, marginBottom:16 }}>
            <div style={{ fontSize:14, fontWeight:700, marginBottom:4 }}>🤖 Anthropic API Key</div>
            <div style={{ fontSize:12, color:"var(--muted)", marginBottom:12 }}>Get your key from <a href="https://console.anthropic.com/settings/keys" target="_blank" style={{ color:"var(--cyan)" }}>console.anthropic.com</a></div>
            <input type="text" value={apiKeyVal} onChange={e => saveKey(e.target.value)} placeholder="sk-ant-api03-..." style={{ width:"100%", padding:"10px 14px", borderRadius:2, border:"1px solid var(--hairline)", fontSize:13, boxSizing:"border-box", fontFamily:"var(--font-mono)", background:"var(--elevated)", color:"var(--text)", WebkitTextSecurity:"disc" }} />
            <div style={{ fontSize:10, color:"var(--muted)", fontFamily:"var(--font-mono)", marginTop:6 }}>
              {apiKeyVal ? `Saved: ${apiKeyVal.length} chars, starts "${apiKeyVal.slice(0,12)}..."` : "No key set"}
            </div>
            <div style={{ display:"flex", gap:8, marginTop:8 }}>
              <button onClick={async () => {
                const key = apiKeyVal.trim().replace(/[^\x20-\x7E]/g, "");
                if (!key) { setTestResult({ ok:false, msg:"No API key entered" }); return; }
                setTesting(true); setTestResult(null);
                try {
                  const r = await fetch(getProxyUrl() + "/v1/messages", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-dangerous-direct-browser-access": "true" },
                    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 10, messages: [{ role: "user", content: "Say OK" }] })
                  });
                  const d = await r.json();
                  if (d.error) setTestResult({ ok:false, msg: d.error.message || d.error.type });
                  else setTestResult({ ok:true, msg:"API key works! Response: " + (d.content?.[0]?.text || "OK") });
                } catch(e) {
                  setTestResult({ ok:false, msg: e.name + ": " + e.message + " — Try: 1) Hard refresh (Ctrl+Shift+R), 2) Disable ad blocker, 3) Try incognito window" });
                }
                setTesting(false);
              }} style={{ padding:"6px 14px", borderRadius:2, border:"1px solid var(--cyan)40", background:"transparent", color:"var(--cyan)", fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"var(--font-mono)" }}>{testing ? "Testing..." : "Test Connection"}</button>
              <button onClick={() => { saveKey(""); setTestResult(null); }} style={{ padding:"6px 14px", borderRadius:2, border:"1px solid var(--hairline)", background:"transparent", color:"var(--muted)", fontSize:11, cursor:"pointer", fontFamily:"var(--font-mono)" }}>Clear</button>
            </div>
            {testResult && <div style={{ marginTop:8, padding:"8px 12px", borderRadius:2, border:`1px solid ${testResult.ok ? "var(--success)" : "var(--magenta)"}40`, background: testResult.ok ? "rgba(61,255,184,0.05)" : "rgba(255,46,147,0.05)", fontSize:11, fontFamily:"var(--font-mono)", color: testResult.ok ? "var(--success)" : "var(--magenta)", lineHeight:1.5 }}>{testResult.ok ? "✓" : "✕"} {testResult.msg}</div>}
          </div>

          <div style={{ background:"var(--surface)", borderRadius:2, border:"1px solid var(--hairline)", padding:"24px", maxWidth:550, marginBottom:16 }}>
            <div style={{ fontSize:14, fontWeight:700, marginBottom:4 }}>🌐 API Proxy URL</div>
            <div style={{ fontSize:12, color:"var(--muted)", marginBottom:12 }}>If your network blocks api.anthropic.com, deploy a Cloudflare Worker proxy and paste its URL here.</div>
            <input type="text" value={proxyVal} onChange={e => saveProxy(e.target.value)} placeholder="https://api.anthropic.com (default)" style={{ width:"100%", padding:"10px 14px", borderRadius:2, border:"1px solid var(--hairline)", fontSize:13, boxSizing:"border-box", fontFamily:"var(--font-mono)", background:"var(--elevated)", color:"var(--text)" }} />
            <div style={{ fontSize:10, color:"var(--muted)", fontFamily:"var(--font-mono)", marginTop:6 }}>
              Using: {getProxyUrl()}
            </div>
          </div>

          <div style={{ background:"var(--surface)", borderRadius:2, border:"1px solid var(--hairline)", padding:"24px", maxWidth:550, marginBottom:16 }}>
            <div style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>🏷️ Areas</div>
            {areas.map(a => (
              <div key={a.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 12px", background:"var(--elevated)", border:"1px solid var(--hairline)", borderRadius:2, marginBottom:6 }}>
                <span style={{ fontSize:16 }}>{a.icon}</span>
                <input value={a.name} onChange={e => update("areas", prev => prev.map(x => x.id === a.id ? { ...x, name: e.target.value } : x))} style={{ flex:1, fontSize:13, fontWeight:600, background:"transparent", border:"none", color:"var(--text)", outline:"none" }} />
                <input value={a.icon} onChange={e => update("areas", prev => prev.map(x => x.id === a.id ? { ...x, icon: e.target.value } : x))} style={{ width:36, fontSize:16, textAlign:"center", background:"transparent", border:"1px solid var(--hairline)", borderRadius:2, color:"var(--text)" }} />
                <div style={{ display:"flex", gap:3 }}>
                  {AREA_SWATCHES.map(sw => <button key={sw} onClick={() => update("areas", prev => prev.map(x => x.id === a.id ? { ...x, color: sw, accent: sw } : x))} style={{ width:16, height:16, borderRadius:2, background:sw, border: a.color === sw ? "2px solid var(--text)" : "1px solid var(--hairline)", cursor:"pointer" }} />)}
                </div>
                <button onClick={() => update("areas", prev => prev.filter(x => x.id !== a.id))} style={{ background:"none", border:"none", color:"var(--muted)", cursor:"pointer", fontSize:14 }}>×</button>
              </div>
            ))}
            <div style={{ display:"flex", gap:8, marginTop:10 }}>
              <input id="newAreaName" placeholder="New area name..." style={{ flex:1, padding:"8px 12px", borderRadius:2, border:"1px solid var(--hairline)", fontSize:12, background:"var(--elevated)", color:"var(--text)" }} />
              <Btn small onClick={() => {
                const inp = document.getElementById("newAreaName");
                if (inp.value.trim()) {
                  update("areas", prev => [...prev, { id: uid(), name: inp.value.trim(), color: AREA_SWATCHES[prev.length % AREA_SWATCHES.length], accent: AREA_SWATCHES[prev.length % AREA_SWATCHES.length], icon: "📌", keywords: [], userCreated: true }]);
                  inp.value = "";
                }
              }}>+ Add</Btn>
            </div>
            <div style={{ marginTop:12 }}>
              <div style={{ fontSize:11, color:"var(--muted)", fontFamily:"var(--font-mono)", marginBottom:6 }}>KEYWORDS (click area to edit)</div>
              {areas.map(a => (
                <div key={a.id} style={{ marginBottom:6 }}>
                  <span style={{ fontSize:11, color:a.color, fontWeight:600, marginRight:8 }}>{a.name}:</span>
                  <input value={(a.keywords || []).join(", ")} onChange={e => update("areas", prev => prev.map(x => x.id === a.id ? { ...x, keywords: e.target.value.split(",").map(k => k.trim()).filter(Boolean) } : x))} placeholder="keyword1, keyword2, ..." style={{ fontSize:11, padding:"4px 8px", borderRadius:2, border:"1px solid var(--hairline)", background:"var(--elevated)", color:"var(--text)", fontFamily:"var(--font-mono)", width:300 }} />
                </div>
              ))}
            </div>
          </div>

          <div style={{ background:"var(--surface)", borderRadius:2, border:"1px solid var(--hairline)", padding:"24px", maxWidth:550 }}>
            <div style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>💾 Data</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <Btn small outline color="var(--cyan)" onClick={() => {
                const d = JSON.stringify(data, null, 2);
                const b = new Blob([d], { type:"application/json" });
                const u = URL.createObjectURL(b);
                const a = document.createElement("a");
                a.href = u; a.download = "synapse-backup-" + new Date().toISOString().slice(0,10) + ".json"; a.click();
              }}>Export Backup</Btn>
              <Btn small outline color="var(--cyan)" onClick={() => {
                const inp = document.createElement("input");
                inp.type = "file"; inp.accept = ".json";
                inp.onchange = (e) => {
                  const reader = new FileReader();
                  reader.onload = (ev) => {
                    try {
                      const imported = JSON.parse(ev.target.result);
                      setData(imported);
                      setToast({ message: "Data imported successfully", type: "success" });
                    } catch(err) { setToast({ message: "Invalid file", type: "error" }); }
                  };
                  reader.readAsText(e.target.files[0]);
                };
                inp.click();
              }}>Import Backup</Btn>
              <Btn small outline color="var(--magenta)" onClick={() => { if (confirm("Wipe all data? This cannot be undone.")) { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem("synapse-digest"); location.reload(); } }}>Wipe Data</Btn>
            </div>
          </div>
        </>}
      </div>

      {/* TIMELINE SPINE */}
      <TimelineSpine notes={notes} onSelect={(n) => { setView("notes"); }} />

      {/* DETAIL PANEL */}
      {panel && <DetailPanel
        type={panel.type}
        item={panel.item}
        areas={areas}
        onClose={() => setPanel(null)}
        onSave={panel.type === "project" ? saveProject : saveTask}
        onDelete={panel.type === "project" ? deleteProject : deleteTask}
        tasks={tasks}
        projects={projects}
        onSaveTask={saveTask}
        onDeleteTask={deleteTask}
        onAddTask={addTask}
        onOpenTask={(t) => setPanel({ type:"task", item: t })}
      />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
