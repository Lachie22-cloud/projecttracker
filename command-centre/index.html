// ============================================================
// AI
// ============================================================
async function aiProcess(raw, projs) {
  const apiKey = localStorage.getItem("pcc-api-key");
  if (!apiKey) { alert("Set your Anthropic API key in Settings (gear icon in sidebar)"); return null; }
  const projCtx = projs.filter(p=>p.status!=="Complete").map(p=>`"${p.name}" (id:${p.id}, area:${AREAS.find(a=>a.id===p.area)?.name})`).join(", ");
  const areaCtx = AREAS.map(a=>`${a.name}(id:${a.id}): ${a.keywords.join(",")}`).join("; ");
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Extract tasks from these meeting notes for a production planner at Dulux Group Rocklea. Areas: ${areaCtx}. Active projects: ${projCtx}. Today is ${new Date().toISOString().slice(0,10)}. Return ONLY JSON array: [{"name":"clean name","area":"area-id","priority":"Critical|High|Medium|Low","effort":"S|M|L|XL","projectId":"id or null","due":"YYYY-MM-DD or null","type":"task|note","original":"raw text"}]. Notes:\n${raw}`}]})});
    const d = await r.json();
    return JSON.parse((d.content?.[0]?.text||"[]").replace(/```json|```/g,"").trim());
  } catch(e) { console.error(e); return null; }
}

// ============================================================
// DONUT CHART
// ============================================================
function Donut({ size=120, stroke=14, segments, center, sub }) {
  const r = (size-stroke)/2, c = 2*Math.PI*r;
  let offset = 0;
  return (
    <div style={{ position:"relative", width:size, height:size }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F1F5F9" strokeWidth={stroke} />
        {segments.map((seg,i) => {
          const dash = (seg.pct/100)*c;
          const o = offset; offset += dash;
          return <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={seg.color} strokeWidth={stroke} strokeDasharray={`${dash} ${c-dash}`} strokeDashoffset={-o} strokeLinecap="round" style={{ transition:"all 0.6s ease" }} />;
        })}
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
        <div style={{ fontSize: size*0.22, fontWeight:800, color:"#1E293B" }}>{center}</div>
        {sub && <div style={{ fontSize: size*0.1, color:"#94A3B8", fontWeight:600 }}>{sub}</div>}
      </div>
    </div>
  );
}

// ============================================================
function AIInbox({projects,onAccept}) {
  const [raw,setRaw]=useState("");
  const [parsed,setParsed]=useState([]);
  const [loading,setLoading]=useState(false);
  const [accepted,setAccepted]=useState(new Set());

  const run=async()=>{
    if(!raw.trim())return;setLoading(true);setParsed([]);setAccepted(new Set());
    const r=await aiProcess(raw,projects);
    if(r)setParsed(r.map((x,i)=>({...x,_id:`ai${i}_${Date.now()}`})));
    setLoading(false);
  };
  const edit=(id,k,v)=>setParsed(p=>p.map(x=>x._id===id?{...x,[k]:v}:x));
  const accept=(item)=>{onAccept({name:item.name,area:item.area||"general",priority:item.priority||"Medium",effort:item.effort||"M",projectId:item.projectId||null,due:item.due||"",status:"Not Started",notes:item.original?`Captured: "${item.original}"`:"",created:new Date().toISOString().slice(0,10)});setAccepted(p=>new Set([...p,item._id]))};
  const taskItems=parsed.filter(p=>p.type==="task");
  const noteItems=parsed.filter(p=>p.type==="note");

  return <div>
    <div style={{background:"#fff",borderRadius:16,border:"1px solid #E2E8F0",padding:"24px",marginBottom:16,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#6366F1,#8B5CF6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🤖</div>
        <div><div style={{fontSize:16,fontWeight:700,color:"#1E293B"}}>AI Quick Capture</div><div style={{fontSize:12,color:"#94A3B8"}}>Dump meeting notes → AI extracts structured tasks</div></div>
      </div>
      <textarea value={raw} onChange={e=>setRaw(e.target.value)} placeholder="Type your raw notes here...\n\ne.g. chase john on pallet issue TAS urgent\nneed to review Q3 numbers by friday\nben should start running MRP independently" rows={5} style={{width:"100%",padding:"14px 16px",borderRadius:12,border:"1.5px solid #E2E8F0",fontSize:13,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box",lineHeight:1.6,color:"#374151",background:"#F8FAFC"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
        <span style={{fontSize:11,color:"#CBD5E1"}}>{raw.trim().split("\n").filter(l=>l.trim()).length} lines</span>
        <div style={{display:"flex",gap:8}}>
          {raw.trim()&&<Btn small outline color="#94A3B8" onClick={()=>{setRaw("");setParsed([]);setAccepted(new Set())}}>Clear</Btn>}
          <Btn small onClick={run} style={{background:loading?"#94A3B8":"linear-gradient(135deg,#6366F1,#8B5CF6)"}}>{loading?"Processing...":"🤖 Extract Tasks"}</Btn>
        </div>
      </div>
    </div>

    {parsed.length>0&&<div style={{background:"#fff",borderRadius:16,border:"1px solid #E2E8F0",padding:"24px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><div style={{fontSize:15,fontWeight:700}}>Extracted Items</div><div style={{fontSize:11,color:"#94A3B8"}}>{taskItems.length} tasks · {noteItems.length} notes</div></div>
        {taskItems.filter(t=>!accepted.has(t._id)).length>0&&<Btn small onClick={()=>taskItems.filter(t=>!accepted.has(t._id)).forEach(accept)} style={{background:"#47CD89"}}>Accept All ({taskItems.filter(t=>!accepted.has(t._id)).length})</Btn>}
      </div>
      {taskItems.map(item=>{const area=AREAS.find(a=>a.id===item.area)||AREAS[4];const proj=item.projectId?projects.find(p=>p.id===item.projectId):null;const done=accepted.has(item._id);
        return <div key={item._id} style={{padding:"14px 16px",borderRadius:12,border:`1.5px solid ${done?"#D1FAE5":"#E2E8F0"}`,background:done?"#F0FDF9":"#F8FAFC",marginBottom:8,opacity:done?0.6:1,transition:"all 0.2s"}}>
          <div style={{fontSize:10,color:"#94A3B8",fontStyle:"italic",marginBottom:6}}>"{item.original}"</div>
          <input value={item.name} onChange={e=>edit(item._id,"name",e.target.value)} disabled={done} style={{width:"100%",fontSize:14,fontWeight:700,border:"none",background:"transparent",color:"#1E293B",outline:"none",padding:0,marginBottom:8,boxSizing:"border-box",fontFamily:"inherit"}}/>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
            <Badge color={area.color} bg={area.bg}>{area.icon} {area.name}</Badge>
            <Badge color={PC[item.priority]} bg={`${PC[item.priority]}15`}><span style={{width:7,height:7,borderRadius:4,background:PC[item.priority]}}/>{item.priority}</Badge>
            <Badge color={EC[item.effort]} bg={`${EC[item.effort]}15`}>{item.effort}</Badge>
            {item.due&&<Badge color="#94A3B8" bg="#F1F5F9">📅 {new Date(item.due).toLocaleDateString("en-AU",{day:"numeric",month:"short"})}</Badge>}
            {proj&&<Badge color="#6366F1" bg="#EEF2FF">🔗 {proj.name}</Badge>}
          </div>
          {!done&&<div style={{display:"flex",gap:4,alignItems:"center"}}>
            <select value={item.area} onChange={e=>edit(item._id,"area",e.target.value)} style={{padding:"4px 8px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:10}}>{AREAS.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}</select>
            <select value={item.priority} onChange={e=>edit(item._id,"priority",e.target.value)} style={{padding:"4px 8px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:10}}>{PRIORITIES.map(p=><option key={p} value={p}>{p}</option>)}</select>
            <select value={item.effort} onChange={e=>edit(item._id,"effort",e.target.value)} style={{padding:"4px 8px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:10}}>{EFFORTS.map(e=><option key={e} value={e}>{e}</option>)}</select>
            <select value={item.projectId||""} onChange={e=>edit(item._id,"projectId",e.target.value||null)} style={{padding:"4px 8px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:10,maxWidth:130}}><option value="">No project</option>{projects.filter(p=>p.status!=="Complete").map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
            <div style={{flex:1}}/>
            <Btn small onClick={()=>accept(item)} style={{background:"#47CD89",borderRadius:16,padding:"4px 14px",fontSize:11}}>✓ Accept</Btn>
          </div>}
          {done&&<div style={{fontSize:11,fontWeight:600,color:"#47CD89"}}>✓ Added to tasks</div>}
        </div>})}
      {noteItems.length>0&&<div style={{marginTop:12}}><div style={{fontSize:11,fontWeight:700,color:"#94A3B8",marginBottom:6}}>NOTES</div>{noteItems.map(n=><div key={n._id} style={{padding:"8px 12px",borderRadius:10,background:"#F8FAFC",border:"1px solid #E2E8F0",marginBottom:4,fontSize:12,color:"#64748B"}}>💭 {n.name||n.original}</div>)}</div>}
    </div>}

    {parsed.length===0&&!loading&&<div style={{background:"#fff",borderRadius:16,border:"1.5px dashed #D1D5DB",padding:"40px 24px",textAlign:"center"}}><div style={{fontSize:36,marginBottom:8}}>📝</div><div style={{fontSize:15,fontWeight:700,color:"#374151",marginBottom:4}}>Your inbox is empty</div><div style={{fontSize:12,color:"#94A3B8",lineHeight:1.6}}>Type meeting notes above and click Extract Tasks.<br/>AI will parse them into structured, actionable items.</div></div>}
  </div>;
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [P,setP]=useState(DEFAULT_PROJECTS);
  const [T,setT]=useState(DEFAULT_TASKS);
  const [view,setView]=useState("dashboard");
  const [af,setAf]=useState("all");
  const [panel,setPanel]=useState(null);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{(async()=>{try{const stored=localStorage.getItem(STORAGE_KEY);if(stored){const d=JSON.parse(stored);if(d.P)setP(d.P);if(d.T)setT(d.T)}}catch(e){console.log("storage load skip")}setLoaded(true)})()},[]);
  const save=useCallback(async(p,t)=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify({P:p,T:t}))}catch(e){}},[]);
  useEffect(()=>{if(loaded)save(P,T)},[P,T,loaded,save]);

  const sP=(p)=>setP(v=>v.map(x=>x.id===p.id?p:x));
  const dP=(id)=>{setP(v=>v.filter(x=>x.id!==id));setT(v=>v.map(t=>t.projectId===id?{...t,projectId:null}:t));setPanel(null)};
  const aP=()=>{const n={id:uid(),name:"New Project",area:af!=="all"?af:"general",status:"Not Started",priority:"Medium",effort:"M",due:"",notes:"",created:new Date().toISOString().slice(0,10)};setP(v=>[...v,n]);setPanel({type:"project",item:n})};
  const sT=(t)=>setT(v=>v.map(x=>x.id===t.id?t:x));
  const dT=(id)=>{setT(v=>v.filter(x=>x.id!==id));if(panel?.item?.id===id)setPanel(null)};
  const aT=(t)=>{const n={...t,id:uid()};setT(v=>[...v,n]);return n};
  const aNT=()=>{const n={id:uid(),name:"New Task",projectId:null,area:af!=="all"?af:"general",status:"Not Started",priority:"Medium",effort:"M",due:"",notes:"",created:new Date().toISOString().slice(0,10)};setT(v=>[...v,n]);setPanel({type:"task",item:n})};

  const fp=useMemo(()=>af==="all"?P:P.filter(p=>p.area===af),[P,af]);
  const ft=useMemo(()=>af==="all"?T:T.filter(t=>t.area===af),[T,af]);
  const cT=T.filter(t=>t.status==="Complete").length;
  const ipP=P.filter(p=>p.status==="In Progress").length;
  const od=P.filter(p=>p.due&&new Date(p.due)<new Date()&&p.status!=="Complete").length;
  const cr=P.filter(p=>p.priority==="Critical"&&p.status!=="Complete").length;
  const getA=id=>AREAS.find(a=>a.id===id)||AREAS[4];

  useEffect(()=>{if(panel){const src=panel.type==="project"?P:T;const u=src.find(x=>x.id===panel.item.id);if(u&&JSON.stringify(u)!==JSON.stringify(panel.item))setPanel({...panel,item:u})}},[P,T]);

  const statusPcts=STATUSES.map(s=>({s,count:P.filter(p=>p.status===s).length,pct:P.length?Math.round((P.filter(p=>p.status===s).length/P.length)*100):0}));

  return (
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#F8FAFC",minHeight:"100vh",color:"#1E293B",display:"flex",height:"100vh",overflow:"hidden"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
      {panel&&<div onClick={()=>setPanel(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.15)",zIndex:999}}/>}

      {/* SIDEBAR */}
      <div style={{width:220,background:"#fff",borderRight:"1px solid #E2E8F0",padding:"20px 12px",display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 8px",marginBottom:24}}>
          <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#6366F1,#8B5CF6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16,fontWeight:800}}>⚙️</div>
          <div><div style={{fontSize:14,fontWeight:800,color:"#1E293B"}}>Command</div><div style={{fontSize:10,color:"#94A3B8",fontWeight:500}}>Rocklea Planning</div></div>
        </div>
        <div style={{fontSize:10,fontWeight:700,color:"#CBD5E1",textTransform:"uppercase",letterSpacing:1,padding:"0 8px",marginBottom:6}}>Overview</div>
        <NavItem icon="📊" label="Dashboard" active={view==="dashboard"} onClick={()=>setView("dashboard")}/>
        <NavItem icon="🤖" label="AI Inbox" active={view==="inbox"} onClick={()=>setView("inbox")} badge={0}/>
        <div style={{fontSize:10,fontWeight:700,color:"#CBD5E1",textTransform:"uppercase",letterSpacing:1,padding:"0 8px",margin:"16px 0 6px"}}>Manage</div>
        <NavItem icon="🎯" label="Projects" active={view==="projects"} onClick={()=>setView("projects")} badge={P.length}/>
        <NavItem icon="📋" label="Tasks" active={view==="tasks"} onClick={()=>setView("tasks")} badge={T.filter(t=>t.status!=="Complete").length}/>
        <NavItem icon="📌" label="Board" active={view==="board"} onClick={()=>setView("board")}/>
        <div style={{flex:1}}/>
        <div style={{fontSize:10,fontWeight:700,color:"#CBD5E1",textTransform:"uppercase",letterSpacing:1,padding:"0 8px",marginBottom:6}}>Areas</div>
        <button onClick={()=>setAf("all")} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 16px",borderRadius:8,border:"none",background:af==="all"?"#F1F5F9":"transparent",color:af==="all"?"#1E293B":"#94A3B8",fontSize:12,fontWeight:500,cursor:"pointer",width:"100%",textAlign:"left"}}>All areas</button>
        {AREAS.map(a=><button key={a.id} onClick={()=>setAf(a.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 16px",borderRadius:8,border:"none",background:af===a.id?a.bg:"transparent",color:af===a.id?a.color:"#94A3B8",fontSize:12,fontWeight:af===a.id?600:500,cursor:"pointer",width:"100%",textAlign:"left"}}><span style={{width:8,height:8,borderRadius:4,background:a.color}}/>{a.name}</button>)}
        <div style={{marginTop:16,borderTop:"1px solid #E2E8F0",paddingTop:12}}>
          <NavItem icon="⚙️" label="Settings" active={view==="settings"} onClick={()=>setView("settings")}/>
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,padding:"24px 28px",overflowY:"auto"}}>

        {/* SETTINGS */}
        {view==="settings"&&<>
          <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>Settings</div>
          <div style={{fontSize:13,color:"#94A3B8",marginBottom:20}}>Configure your Command Centre</div>
          <div style={{background:"#fff",borderRadius:16,border:"1px solid #E2E8F0",padding:"24px",maxWidth:500,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>🤖 AI Inbox — API Key</div>
            <div style={{fontSize:12,color:"#94A3B8",marginBottom:12}}>Required for the AI task extraction feature. Get your key from <a href="https://console.anthropic.com/settings/keys" target="_blank" style={{color:"#6366F1"}}>console.anthropic.com</a></div>
            <input type="password" defaultValue={localStorage.getItem("pcc-api-key")||""} onChange={e=>{localStorage.setItem("pcc-api-key",e.target.value);}} placeholder="sk-ant-api03-..." style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #E2E8F0",fontSize:13,boxSizing:"border-box",fontFamily:"monospace"}}/>
            <div style={{fontSize:10,color:"#CBD5E1",marginTop:6}}>Key is stored in your browser only — never sent anywhere except Anthropic's API</div>
          </div>
          <div style={{background:"#fff",borderRadius:16,border:"1px solid #E2E8F0",padding:"24px",maxWidth:500,marginTop:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>💾 Data</div>
            <div style={{fontSize:12,color:"#94A3B8",marginBottom:12}}>Your data is stored locally in this browser</div>
            <div style={{display:"flex",gap:8}}>
              <Btn small outline color="#6366F1" onClick={()=>{const d=JSON.stringify({P,T},null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="command-centre-backup.json";a.click()}}>Export Backup</Btn>
              <Btn small outline color="#F97066" onClick={()=>{if(confirm("Reset all data to defaults? This cannot be undone.")){localStorage.removeItem(STORAGE_KEY);location.reload()}}}>Reset Data</Btn>
            </div>
          </div>
        </>}

        {/* DASHBOARD */}
        {view==="dashboard"&&<>
          <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>Welcome back, Lachie 👋</div>
          <div style={{fontSize:13,color:"#94A3B8",marginBottom:20}}>Here's your planning overview</div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:20}}>
            {[{l:"Total Projects",v:P.length,s:`${ipP} active`,c:"#6366F1",i:"🎯"},{l:"Tasks Done",v:`${cT}/${T.length}`,s:`${T.length?Math.round(cT/T.length*100):0}%`,c:"#47CD89",i:"✅"},{l:"Critical",v:cr,s:cr?"Needs attention":"All clear",c:"#F97066",i:"🚨"},{l:"Overdue",v:od,s:od?"Past due":"On track",c:od?"#FB923C":"#47CD89",i:"⏰"}].map((c,i)=><div key={i} style={{background:"#fff",borderRadius:16,padding:"18px 20px",border:"1px solid #E2E8F0",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}><div style={{fontSize:10,fontWeight:600,color:"#94A3B8",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{c.l}</div><div style={{fontSize:28,fontWeight:800,color:c.c}}>{c.v}</div><div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{c.s}</div></div>)}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:16,marginBottom:20}}>

              </div>
            </div>
            {/* Area Cards */}
            <div style={{background:"#fff",borderRadius:16,padding:"20px",border:"1px solid #E2E8F0",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Areas</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {AREAS.map(a=>{const ap=P.filter(p=>p.area===a.id);const at=T.filter(t=>t.area===a.id);const dn=at.filter(t=>t.status==="Complete").length;const pct=at.length?Math.round(dn/at.length*100):0;
                  return <div key={a.id} onClick={()=>{setAf(a.id);setView("projects")}} style={{padding:"12px 14px",borderRadius:12,background:a.bg,cursor:"pointer",border:`1px solid ${a.color}20`,transition:"all 0.15s"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:12,fontWeight:700,color:a.color}}>{a.icon} {a.name}</span><span style={{fontSize:10,color:"#94A3B8"}}>{ap.length}p</span></div>

                  </div>})}

          </div>

          <div style={{background:"#fff",borderRadius:16,padding:"20px",border:"1px solid #E2E8F0",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Upcoming Deadlines</div>
            {[...P].filter(p=>p.status!=="Complete"&&p.due).sort((a,b)=>new Date(a.due)-new Date(b.due)).slice(0,6).map((p,i,arr)=>{const a=getA(p.area);const isOd=new Date(p.due)<new Date();return <div key={p.id} onClick={()=>setPanel({type:"project",item:p})} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:12,background:isOd?"#FEF3F2":"#F8FAFC",marginBottom:4,cursor:"pointer",border:"1px solid #E2E8F0",transition:"all 0.15s"}}>
              <div style={{width:36,height:36,borderRadius:10,background:a.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,border:`1px solid ${a.color}30`}}>{a.icon}</div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{p.name}</div><div style={{fontSize:10,color:"#94A3B8"}}>{a.name}</div></div>
              <Badge color={SC[p.status]} bg={SBG[p.status]}>{p.status}</Badge>
              <div style={{fontSize:12,fontWeight:600,color:isOd?"#F97066":"#64748B",minWidth:50,textAlign:"right"}}>{isOd?"⚠️ ":""}{new Date(p.due).toLocaleDateString("en-AU",{day:"numeric",month:"short"})}</div>
            </div>})}
          </div>
        </>}

        {/* INBOX */}
        {view==="inbox"&&<><div style={{fontSize:22,fontWeight:800,marginBottom:4}}>🤖 AI Inbox</div><div style={{fontSize:13,color:"#94A3B8",marginBottom:20}}>Quick capture meeting notes into structured tasks</div><AIInbox projects={P} onAccept={aT}/></>}

        {/* PROJECTS */}
        {view==="projects"&&<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><div style={{fontSize:22,fontWeight:800}}>Projects</div><div style={{fontSize:13,color:"#94A3B8"}}>{fp.length} projects{af!=="all"?` in ${getA(af).name}`:""}</div></div><Btn onClick={aP}>+ New Project</Btn></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
            {fp.map(p=>{const a=getA(p.area);const pt=T.filter(t=>t.projectId===p.id);const dn=pt.filter(t=>t.status==="Complete").length;const prog=pt.length?Math.round(dn/pt.length*100):0;
              return <div key={p.id} onClick={()=>setPanel({type:"project",item:p})} style={{background:"#fff",borderRadius:16,padding:"18px 20px",border:"1px solid #E2E8F0",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",transition:"all 0.15s"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><Badge color={a.color} bg={a.bg}>{a.icon} {a.name}</Badge><Badge color={SC[p.status]} bg={SBG[p.status]}>{p.status}</Badge></div>
                <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>{p.name}</div>
                <PBar value={prog} color={a.color} h={6}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{width:9,height:9,borderRadius:5,background:PC[p.priority]}}/><span style={{fontSize:11,color:"#64748B"}}>{p.priority}</span><Badge color={EC[p.effort]} bg={`${EC[p.effort]}15`} s={{fontSize:10}}>{p.effort}</Badge></div>
                  <span style={{fontSize:11,color:"#94A3B8"}}>{pt.length>0?`${dn}/${pt.length} tasks`:"0 tasks"} · {p.due?new Date(p.due).toLocaleDateString("en-AU",{day:"numeric",month:"short"}):"—"}</span>
                </div>
              </div>})}
          </div>
        </>}

        {/* TASKS */}
        {view==="tasks"&&<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><div style={{fontSize:22,fontWeight:800}}>Tasks</div><div style={{fontSize:13,color:"#94A3B8"}}>{ft.length} tasks{af!=="all"?` in ${getA(af).name}`:""}</div></div><Btn onClick={aNT}>+ New Task</Btn></div>
          {ft.sort((a,b)=>{const si=STATUSES.indexOf(a.status)-STATUSES.indexOf(b.status);return si!==0?si:PRIORITIES.indexOf(a.priority)-PRIORITIES.indexOf(b.priority)}).map(t=>{const a=getA(t.area);const proj=P.find(p=>p.id===t.projectId);return <div key={t.id} onClick={()=>setPanel({type:"task",item:t})} style={{background:"#fff",borderRadius:12,padding:"12px 16px",border:"1px solid #E2E8F0",cursor:"pointer",display:"flex",alignItems:"center",gap:12,marginBottom:4,boxShadow:"0 1px 2px rgba(0,0,0,0.03)"}}>
            <div style={{width:22,height:22,borderRadius:22,border:`2px solid ${SC[t.status]}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,background:t.status==="Complete"?SC[t.status]:"transparent",color:t.status==="Complete"?"#fff":"transparent"}}>{t.status==="Complete"?"✓":""}</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,textDecoration:t.status==="Complete"?"line-through":"none",color:t.status==="Complete"?"#94A3B8":"#1E293B"}}>{t.name}</div>{proj&&<div style={{fontSize:10,color:"#94A3B8",marginTop:1}}>🔗 {proj.name}</div>}</div>
            <Badge color={SC[t.status]} bg={SBG[t.status]}>{t.status}</Badge>
            <span style={{width:9,height:9,borderRadius:5,background:PC[t.priority]}} title={t.priority}/>
            <Badge color={EC[t.effort]} bg={`${EC[t.effort]}15`}>{t.effort}</Badge>
            <span style={{fontSize:11,color:"#94A3B8",minWidth:40}}>{t.due?new Date(t.due).toLocaleDateString("en-AU",{day:"numeric",month:"short"}):""}</span>
          </div>})}
        </>}

        {/* BOARD */}
        {view==="board"&&<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><div style={{fontSize:22,fontWeight:800}}>Board</div><div style={{fontSize:13,color:"#94A3B8"}}>Kanban view{af!=="all"?` · ${getA(af).name}`:""}</div></div><Btn onClick={aNT}>+ New Task</Btn></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
            {STATUSES.map(status=>{const col=ft.filter(t=>t.status===status);return <div key={status}><div style={{fontSize:12,fontWeight:700,color:SC[status],marginBottom:8,display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:4,background:SC[status]}}/>{status} ({col.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:6,minHeight:60}}>
                {col.map(t=>{const a=getA(t.area);const proj=P.find(p=>p.id===t.projectId);return <div key={t.id} onClick={()=>setPanel({type:"task",item:t})} style={{background:"#fff",borderRadius:12,padding:"12px",border:"1px solid #E2E8F0",cursor:"pointer",boxShadow:"0 1px 2px rgba(0,0,0,0.03)"}}>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{t.name}</div>
                  {proj&&<div style={{fontSize:9,color:"#94A3B8",marginBottom:4}}>🔗 {proj.name}</div>}
                  <div style={{display:"flex",gap:4,alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{width:7,height:7,borderRadius:4,background:PC[t.priority]}}/><Badge color={EC[t.effort]} bg={`${EC[t.effort]}15`} s={{fontSize:9,padding:"1px 6px"}}>{t.effort}</Badge></div><span style={{fontSize:9,color:"#94A3B8"}}>{t.due?new Date(t.due).toLocaleDateString("en-AU",{day:"numeric",month:"short"}):""}</span></div>
                </div>})}
              </div>
            </div>})}
          </div>
        </>}
      </div>

      {panel&&<DetailPanel type={panel.type} item={panel.item} onClose={()=>setPanel(null)} onSave={panel.type==="project"?sP:sT} onDelete={panel.type==="project"?dP:dT} tasks={T} projects={P} onSaveTask={sT} onDeleteTask={dT} onAddTask={aT} onOpenTask={t=>setPanel({type:"task",item:t})}/>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
