<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --card: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --accent: #e91e8c;
    --accent-soft: rgba(233,30,140,0.12);
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #f0f0f0;
    --text-secondary: #888;
    --text-dim: #555;
    --radius: 12px;
    --font: 'Inter', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
  ::selection { background: rgba(233,30,140,0.25); }
  input, textarea, select, button { font-family: inherit; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
  a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================================
// CONSTANTS
// ============================================================
const STORAGE_KEY = "pcc-v9-synapse";
const API_KEY_KEY = "synapse-api-key";
const PROXY_KEY = "synapse-proxy-url";

(() => { if (!localStorage.getItem(API_KEY_KEY)) { const old = localStorage.getItem("pcc-api-key"); if (old) localStorage.setItem(API_KEY_KEY, old); } })();

function uid() { return "id_" + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function now() { return new Date().toISOString(); }
function touchNow(item) { return { ...item, touchedAt: now(), updatedAt: now() }; }
function daysSince(ts) { if (!ts) return 999; return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000); }
function isForgotten(item, n=7) { return item.status !== "Complete" && daysSince(item.touchedAt || item.updatedAt || item.createdAt) > n; }
function fmt(ts) { if (!ts) return ""; return new Date(ts).toLocaleDateString("en-AU",{day:"numeric",month:"short"}); }
function fmtTime(ts) { if (!ts) return ""; return new Date(ts).toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit",hour12:false}); }
function fmtFull(ts) { if (!ts) return ""; return fmt(ts) + " " + fmtTime(ts); }

function getNextDue(due, recurrence) {
  if (!due || !recurrence) return null;
  const d = new Date(due + "T00:00:00");
  if (recurrence === "daily") d.setDate(d.getDate() + 1);
  else if (recurrence === "weekly") d.setDate(d.getDate() + 7);
  else if (recurrence === "monthly") d.setMonth(d.getMonth() + 1);
  else if (recurrence?.type === "custom") d.setDate(d.getDate() + (recurrence.days || 7));
  return d.toISOString().slice(0, 10);
}
function getRecurrenceLabel(rec) {
  if (!rec) return null;
  if (rec === "daily") return "Daily"; if (rec === "weekly") return "Weekly"; if (rec === "monthly") return "Monthly";
  if (rec?.type === "custom") return "Every " + rec.days + "d"; return null;
}
function generateGhostDates(due, recurrence, endDate, limit) {
  if (!due || !recurrence) return [];
  const dates = []; let current = due;
  for (let i = 0; i < (limit||12); i++) { const next = getNextDue(current, recurrence); if (!next || next > (endDate||"2027-12-31")) break; dates.push(next); current = next; }
  return dates;
}

const STATUSES = ["Not Started","In Progress","On Hold","Complete"];
const SC = {"Not Started":"#555","In Progress":"#3b82f6","On Hold":"#eab308","Complete":"#22c55e"};
const PRIORITIES = ["Critical","High","Medium","Low"];
const PC = {Critical:"#ef4444",High:"#f97316",Medium:"#eab308",Low:"#888"};
const EFFORTS = ["S","M","L","XL"];
const EC = {S:"#22c55e",M:"#3b82f6",L:"#eab308",XL:"#ef4444"};

const DEFAULT_AREAS = [
  { id:"work", name:"Work", color:"#3b82f6", icon:"💼", keywords:["meeting","report","email","slides","review","deadline"], userCreated:false },
  { id:"personal", name:"Personal", color:"#e91e8c", icon:"🏠", keywords:["home","errand","health","appointment","call"], userCreated:false },
  { id:"ideas", name:"Ideas", color:"#a855f7", icon:"💡", keywords:["idea","think","explore","research","blog","write"], userCreated:false },
];
const AREA_SWATCHES = ["#e91e8c","#3b82f6","#22c55e","#eab308","#a855f7","#f97316","#06b6d4","#ec4899"];

// ============================================================
// DATA
// ============================================================
function loadData() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e){} return { notes:[], tasks:[], projects:[], areas:DEFAULT_AREAS, proposals:[] }; }
function saveData(data) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){} }
function getApiKey() { const r = localStorage.getItem(API_KEY_KEY); if (!r) return null; return r.trim().replace(/[^\x20-\x7E]/g,""); }
function getProxyUrl() { return (localStorage.getItem(PROXY_KEY)||"").trim() || "/api/proxy"; }

// ============================================================
// AI — all calls go through /api/proxy (Vercel serverless function)
// ============================================================
async function aiCall(body) {
  const apiKey = getApiKey();
  if (!apiKey) return null;
  try {
    const r = await fetch(getProxyUrl(), {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message || d.error.type || JSON.stringify(d.error));
    return d;
  } catch(e) { console.error("AI error:", e); window._lastAiError = e.message; return null; }
}

async function aiParseCapture(rawText, areas, projects, recentNotes) {
  const today = new Date().toISOString().slice(0,10);
  const areaCtx = areas.map(a => `${a.name}(id:${a.id}): keywords=[${a.keywords.join(",")}]`).join("; ");
  const projCtx = projects.filter(p=>p.status!=="Complete").map(p=>`"${p.name}"(id:${p.id})`).join(", ");
  const d = await aiCall({
    model:"claude-sonnet-4-20250514", max_tokens:2000,
    messages:[{role:"user",content:`You are a second-brain parser. Extract structured tasks from a mind dump. Be domain-agnostic.\n\nAreas: ${areaCtx}\nActive projects: ${projCtx||"none"}\nToday: ${today}\n\nReturn ONLY valid JSON:\n{"tasks":[{"name":"task","priority":"Critical|High|Medium|Low","effort":"S|M|L|XL","areaId":"id or null","projectId":"id or null","due":"YYYY-MM-DD or null","confidence":0.0-1.0,"sourceSpan":"original text"}],"thoughts":["non-actionable observations"],"summary":"one-line summary"}\n\nMind dump:\n${rawText}`}]
  });
  if (!d) return null;
  try { return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim()); } catch(e) { return null; }
}

async function aiDigest(tasks, projects, areas) {
  const today = new Date().toISOString().slice(0,10);
  const tData = tasks.map(t => `[${t.status}] "${t.name}" (priority:${t.priority}, due:${t.due||"none"}, touched:${daysSince(t.touchedAt||t.createdAt)}d${isForgotten(t)?", FORGOTTEN":""})`).join("\n");
  const pData = projects.map(p => `[${p.status}] "${p.name}" (priority:${p.priority}, due:${p.due||"none"}, touched:${daysSince(p.touchedAt||p.createdAt)}d)`).join("\n");
  const d = await aiCall({
    model:"claude-sonnet-4-20250514", max_tokens:1500,
    messages:[{role:"user",content:`You are a daily digest assistant. Today: ${today}. Rules: forgotten=not Complete + untouched >7d, incoming=due within 3d, stalled=On Hold >14d.\n\nTASKS:\n${tData||"none"}\n\nPROJECTS:\n${pData||"none"}\n\nReturn ONLY valid JSON:\n{"greeting":"one-liner","today_focus":["items"],"forgotten":[{"name":"x","days":0}],"incoming":[{"name":"x","due":"date"}],"stalled":[{"name":"x"}],"wins":["items"],"risk_areas":["items"],"recommendation":"paragraph"}`}]
  });
  if (!d) return null;
  try { return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim()); } catch(e) { return null; }
}

async function aiProposeProjects(notes, areas) {
  const unlinked = notes.filter(n => !n.extractedIds?.length).slice(-20);
  if (unlinked.length < 3) return [];
  const noteCtx = unlinked.map(n => `[${n.createdAt}] ${n.rawText.slice(0,200)}`).join("\n");
  const d = await aiCall({
    model:"claude-sonnet-4-20250514", max_tokens:1000,
    messages:[{role:"user",content:`Look at these notes. Find recurring themes (3+ notes) that should be a Project. If not confident, return [].\n\nAreas: ${areas.map(a=>`${a.name}(${a.id})`).join(", ")}\nNotes:\n${noteCtx}\n\nReturn ONLY JSON array:\n[{"suggestedName":"name","areaId":"id","themeSummary":"why","confidence":0.0-1.0}]`}]
  });
  if (!d) return [];
  try { return JSON.parse((d.content?.[0]?.text||"[]").replace(/```json|```/g,"").trim()); } catch(e) { return []; }
}

// ============================================================
// UI COMPONENTS
// ============================================================
const Card = ({children, style={}}) => <div style={{background:"var(--card)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:20, ...style}}>{children}</div>;
const Badge = ({children, color="var(--text-secondary)", style={}}) => <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:500,color,background:`${color}18`,whiteSpace:"nowrap",...style}}>{children}</span>;

function Btn({children,onClick,variant="primary",small,disabled,style={}}) {
  const styles = {
    primary: {background:"var(--accent)",color:"#fff",border:"none"},
    secondary: {background:"transparent",color:"var(--text-secondary)",border:"1px solid var(--border)"},
    danger: {background:"transparent",color:"var(--red)",border:"1px solid rgba(239,68,68,0.3)"},
    ghost: {background:"transparent",color:"var(--text-secondary)",border:"none"},
  };
  return <button onClick={onClick} disabled={disabled} style={{padding:small?"5px 12px":"8px 16px",borderRadius:8,fontSize:small?12:13,fontWeight:500,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,transition:"opacity 0.15s",...styles[variant],...style}}>{children}</button>;
}

function NavItem({icon,label,active,onClick,count}) {
  return <button onClick={onClick} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,border:"none",background:active?"var(--accent-soft)":"transparent",color:active?"var(--accent)":"var(--text-secondary)",fontSize:13,fontWeight:active?600:400,cursor:"pointer",width:"100%",textAlign:"left",transition:"all 0.15s"}}>
    <span style={{fontSize:15,width:20,textAlign:"center"}}>{icon}</span><span style={{flex:1}}>{label}</span>
    {count>0&&<span style={{fontSize:10,fontWeight:600,color:active?"var(--accent)":"var(--text-dim)",fontFamily:"var(--mono)"}}>{count}</span>}
  </button>;
}

function Donut({size=100,stroke=10,segments,center,sub}) {
  const r=(size-stroke)/2, c=2*Math.PI*r; let offset=0;
  return <div style={{position:"relative",width:size,height:size}}>
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth={stroke}/>
    {segments.map((s,i)=>{const dash=(s.pct/100)*c;const o=offset;offset+=dash;return <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={stroke} strokeDasharray={`${dash} ${c-dash}`} strokeDashoffset={-o} style={{transition:"all 0.5s"}}/>;})}</svg>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:size*0.2,fontWeight:700}}>{center}</div>{sub&&<div style={{fontSize:size*0.09,color:"var(--text-secondary)"}}>{sub}</div>}</div>
  </div>;
}

function Toast({message,type="info",onDismiss}) {
  const c = {info:"var(--blue)",error:"var(--red)",success:"var(--green)",warning:"var(--yellow)"};
  useEffect(()=>{const t=setTimeout(onDismiss,4000);return()=>clearTimeout(t)},[]);
  return <div style={{position:"fixed",bottom:20,right:20,background:"var(--card)",border:`1px solid ${c[type]}40`,padding:"10px 16px",borderRadius:10,fontSize:12,zIndex:9999,maxWidth:400,display:"flex",alignItems:"center",gap:8,color:"var(--text)"}}>
    <span style={{width:6,height:6,borderRadius:3,background:c[type],flexShrink:0}}/>{message}
  </div>;
}

// ============================================================
// CAPTURE MODAL
// ============================================================
function CaptureModal({onCommit,onClose}) {
  const [text,setText]=useState(""); const ref=useRef(null);
  useEffect(()=>{ref.current?.focus()},[]);
  const handleKey=(e)=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){e.preventDefault();if(text.trim())onCommit(text.trim())} if(e.key==="Escape")onClose(); };
  return <div style={{position:"fixed",inset:0,zIndex:5000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(24px)",background:"rgba(0,0,0,0.7)"}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:640,margin:"0 20px"}}>
      <div style={{fontSize:13,fontWeight:600,color:"var(--text-secondary)",marginBottom:12,display:"flex",justifyContent:"space-between"}}><span>Mind Dump</span><span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text-dim)"}}>⌘↵ commit · esc close</span></div>
      <textarea ref={ref} value={text} onChange={e=>setText(e.target.value)} onKeyDown={handleKey} placeholder="What's on your mind..."
        style={{width:"100%",minHeight:180,padding:20,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)",color:"var(--text)",fontSize:14,fontFamily:"var(--mono)",lineHeight:1.8,resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
        <span style={{fontSize:11,color:"var(--text-dim)",fontFamily:"var(--mono)"}}>{text.trim().split("\n").filter(l=>l.trim()).length} lines</span>
        <div style={{display:"flex",gap:6}}><Btn variant="secondary" small onClick={onClose}>Cancel</Btn><Btn small onClick={()=>text.trim()&&onCommit(text.trim())} disabled={!text.trim()}>Commit</Btn></div>
      </div>
    </div>
  </div>;
}

// ============================================================
// REVIEW CARD
// ============================================================
function ReviewCard({result,areas,onAccept,onDismiss}) {
  const [items,setItems]=useState((result.tasks||[]).map((t,i)=>({...t,_id:uid(),_selected:true})));
  const edit=(id,k,v)=>setItems(p=>p.map(x=>x._id===id?{...x,[k]:v}:x));
  const toggle=id=>setItems(p=>p.map(x=>x._id===id?{...x,_selected:!x._selected}:x));
  return <div style={{position:"fixed",bottom:0,left:240,right:0,zIndex:4000,background:"var(--surface)",borderTop:"1px solid var(--border)",padding:"16px 24px",maxHeight:"50vh",overflowY:"auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div><div style={{fontSize:14,fontWeight:600}}>AI Extracted {items.length} tasks</div>{result.summary&&<div style={{fontSize:12,color:"var(--text-secondary)",marginTop:2}}>{result.summary}</div>}</div>
      <div style={{display:"flex",gap:6}}><Btn variant="secondary" small onClick={onDismiss}>Discard</Btn><Btn small onClick={()=>onAccept(items.filter(i=>i._selected))}>Accept ({items.filter(i=>i._selected).length})</Btn></div>
    </div>
    {items.map(item=>{const area=areas.find(a=>a.id===item.areaId);const conf=item.confidence||0;
      return <div key={item._id} style={{display:"flex",gap:10,padding:"10px 12px",background:"var(--card)",border:`1px solid ${item._selected?"var(--accent)20":"var(--border)"}`,borderRadius:8,marginBottom:4,opacity:item._selected?1:0.4,transition:"all 0.15s"}}>
        <button onClick={()=>toggle(item._id)} style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${item._selected?"var(--accent)":"var(--text-dim)"}`,background:item._selected?"var(--accent)":"transparent",color:"#fff",fontSize:10,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:1}}>{item._selected?"✓":""}</button>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <input value={item.name} onChange={e=>edit(item._id,"name",e.target.value)} style={{flex:1,fontSize:13,fontWeight:500,background:"transparent",border:"none",color:"var(--text)",outline:"none"}}/>
            <div style={{width:6,height:6,borderRadius:3,background:conf>=0.8?"var(--green)":conf>=0.6?"var(--yellow)":"var(--red)"}} title={`${Math.round(conf*100)}%`}/>
          </div>
          {item.sourceSpan&&<div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"var(--mono)",marginBottom:4}}>"{item.sourceSpan}"</div>}
          <div style={{display:"flex",gap:4}}>{area&&<Badge color={area.color}>{area.icon} {area.name}</Badge>}<Badge color={PC[item.priority]}>{item.priority}</Badge>{item.due&&<Badge color="var(--text-secondary)">Due {fmt(item.due)}</Badge>}</div>
        </div>
      </div>;
    })}
  </div>;
}

// ============================================================
// DETAIL PANEL
// ============================================================
function DetailPanel({type,item,areas,onClose,onSave,onDelete,tasks,projects,onSaveTask,onDeleteTask,onAddTask,onOpenTask}) {
  const [f,setF]=useState({...item});
  const upd=(k,v)=>{const nf=touchNow({...f,[k]:v});setF(nf);onSave(nf)};
  useEffect(()=>{setF({...item})},[item]);
  const area=areas.find(a=>a.id===f.areaId)||areas[0];
  const linked=type==="project"?(tasks||[]).filter(t=>t.projectId===f.id):[];
  const done=linked.filter(t=>t.status==="Complete").length;
  const prog=linked.length?Math.round((done/linked.length)*100):0;
  const parent=type==="task"&&f.projectId?(projects||[]).find(p=>p.id===f.projectId):null;
  const [adding,setAdding]=useState(false);const [nn,setNn]=useState("");
  const inputStyle={width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid var(--border)",fontSize:12,background:"var(--surface)",color:"var(--text)",boxSizing:"border-box"};

  return <div style={{position:"fixed",right:0,top:0,bottom:0,width:400,maxWidth:"95vw",background:"var(--surface)",boxShadow:"-4px 0 30px rgba(0,0,0,0.3)",zIndex:1000,display:"flex",flexDirection:"column",borderLeft:"1px solid var(--border)"}}>
    <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <Badge color={area.color}>{area.icon} {area.name}</Badge>
      <button onClick={onClose} style={{background:"var(--card)",border:"1px solid var(--border)",width:28,height:28,borderRadius:8,cursor:"pointer",color:"var(--text-secondary)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>✕</button>
    </div>
    <div style={{padding:"16px 20px"}}><input value={f.name} onChange={e=>upd("name",e.target.value)} style={{width:"100%",fontSize:16,fontWeight:600,border:"none",background:"transparent",color:"var(--text)",outline:"none"}}/></div>
    <div style={{flex:1,overflowY:"auto",padding:"0 20px 20px"}}>
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:16}}>{STATUSES.map(s=><button key={s} onClick={()=>upd("status",s)} style={{padding:"4px 12px",borderRadius:6,border:f.status===s?`1.5px solid ${SC[s]}`:"1px solid var(--border)",background:f.status===s?`${SC[s]}15`:"transparent",color:f.status===s?SC[s]:"var(--text-dim)",fontSize:11,fontWeight:500,cursor:"pointer"}}>{s}</button>)}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        <div><label style={{fontSize:11,color:"var(--text-dim)",marginBottom:4,display:"block"}}>Priority</label><div style={{display:"flex",gap:3}}>{PRIORITIES.map(p=><button key={p} onClick={()=>upd("priority",p)} style={{width:26,height:26,borderRadius:6,border:f.priority===p?`1.5px solid ${PC[p]}`:"1px solid var(--border)",background:f.priority===p?`${PC[p]}18`:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} title={p}><span style={{width:8,height:8,borderRadius:4,background:PC[p]}}/></button>)}</div></div>
        <div><label style={{fontSize:11,color:"var(--text-dim)",marginBottom:4,display:"block"}}>Effort</label><div style={{display:"flex",gap:3}}>{EFFORTS.map(e=><button key={e} onClick={()=>upd("effort",e)} style={{padding:"4px 8px",borderRadius:6,border:f.effort===e?`1.5px solid ${EC[e]}`:"1px solid var(--border)",background:f.effort===e?`${EC[e]}18`:"transparent",color:f.effort===e?EC[e]:"var(--text-dim)",fontSize:11,fontWeight:600,cursor:"pointer"}}>{e}</button>)}</div></div>
        <div><label style={{fontSize:11,color:"var(--text-dim)",marginBottom:4,display:"block"}}>Area</label><select value={f.areaId||""} onChange={e=>upd("areaId",e.target.value)} style={inputStyle}>{areas.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}</select></div>
        <div><label style={{fontSize:11,color:"var(--text-dim)",marginBottom:4,display:"block"}}>Due</label><input type="date" value={f.due||""} onChange={e=>upd("due",e.target.value)} style={inputStyle}/></div>
        <div><label style={{fontSize:11,color:"var(--text-dim)",marginBottom:4,display:"block"}}>Recurrence</label><select value={typeof f.recurrence==="object"?"custom":f.recurrence||"none"} onChange={e=>{const v=e.target.value;if(v==="none")upd("recurrence",null);else if(v==="custom")upd("recurrence",{type:"custom",days:14});else upd("recurrence",v)}} style={inputStyle}><option value="none">None</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="custom">Custom</option></select></div>
        {f.recurrence&&typeof f.recurrence==="object"&&<div><label style={{fontSize:11,color:"var(--text-dim)",marginBottom:4,display:"block"}}>Every X days</label><input type="number" value={f.recurrence.days||14} onChange={e=>upd("recurrence",{type:"custom",days:Math.max(1,parseInt(e.target.value)||1)})} min={1} style={inputStyle}/></div>}
        {type==="task"&&<div style={{gridColumn:"1/3"}}><label style={{fontSize:11,color:"var(--text-dim)",marginBottom:4,display:"block"}}>Project</label><select value={f.projectId||""} onChange={e=>upd("projectId",e.target.value||null)} style={inputStyle}><option value="">None</option>{(projects||[]).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>}
      </div>
      {type==="task"&&parent&&<Card style={{marginBottom:16,padding:12}}><div style={{fontSize:10,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Parent Project</div><div style={{fontSize:13,fontWeight:600}}>{parent.name}</div></Card>}
      {type==="project"&&linked.length>0&&<div style={{marginBottom:16,display:"flex",alignItems:"center",gap:12}}><Donut size={56} stroke={6} center={`${prog}%`} segments={[{pct:prog,color:area.color}]}/><div><div style={{fontSize:18,fontWeight:700}}>{done}<span style={{fontSize:12,color:"var(--text-secondary)"}}>/{linked.length}</span></div><div style={{fontSize:11,color:"var(--text-secondary)"}}>complete</div></div></div>}
      <div style={{marginBottom:16}}><label style={{fontSize:11,color:"var(--text-dim)",marginBottom:4,display:"block"}}>Notes</label><textarea value={f.notes||""} onChange={e=>upd("notes",e.target.value)} placeholder="Notes..." rows={3} style={{...inputStyle,fontFamily:"var(--mono)",lineHeight:1.5,resize:"vertical"}}/></div>
      {type==="project"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:12,fontWeight:600}}>Tasks ({linked.length})</span><Btn variant="ghost" small onClick={()=>setAdding(true)}>+ Add</Btn></div>
        {adding&&<div style={{display:"flex",gap:4,marginBottom:8}}><input value={nn} onChange={e=>setNn(e.target.value)} placeholder="Task name..." autoFocus onKeyDown={e=>{if(e.key==="Enter"&&nn.trim()){onAddTask({name:nn.trim(),projectId:f.id,areaId:f.areaId,status:"Not Started",priority:"Medium",effort:"M",due:"",notes:"",createdAt:now(),updatedAt:now(),touchedAt:now(),recurrence:null});setNn("");setAdding(false)}}} style={{...inputStyle,flex:1}}/><Btn small onClick={()=>{if(nn.trim()){onAddTask({name:nn.trim(),projectId:f.id,areaId:f.areaId,status:"Not Started",priority:"Medium",effort:"M",due:"",notes:"",createdAt:now(),updatedAt:now(),touchedAt:now(),recurrence:null});setNn("");setAdding(false)}}}>Add</Btn></div>}
        {linked.sort((a,b)=>a.status==="Complete"?1:b.status==="Complete"?-1:0).map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,background:"var(--card)",border:"1px solid var(--border)",marginBottom:3}}>
          <button onClick={()=>{const i=STATUSES.indexOf(t.status);onSaveTask(touchNow({...t,status:STATUSES[(i+1)%STATUSES.length]}))}} style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${SC[t.status]}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,cursor:"pointer",background:t.status==="Complete"?SC[t.status]:"transparent",color:"#fff"}}>{t.status==="Complete"?"✓":""}</button>
          <div style={{flex:1,cursor:"pointer"}} onClick={()=>onOpenTask(t)}><div style={{fontSize:12,fontWeight:500,textDecoration:t.status==="Complete"?"line-through":"none",color:t.status==="Complete"?"var(--text-dim)":"var(--text)"}}>{t.name}</div></div>
          <span style={{width:6,height:6,borderRadius:3,background:PC[t.priority]}} title={t.priority}/>
        </div>)}
      </div>}
    </div>
    <div style={{padding:"12px 20px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between"}}><Btn variant="danger" small onClick={()=>{onDelete(f.id);onClose()}}>Delete</Btn><Btn variant="secondary" small onClick={onClose}>Done</Btn></div>
  </div>;
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [data,setData]=useState(loadData);
  const {notes,tasks,projects,areas,proposals}=data;
  const [view,setView]=useState("capture");
  const [panel,setPanel]=useState(null);
  const [showCapture,setShowCapture]=useState(false);
  const [review,setReview]=useState(null);
  const [toast,setToast]=useState(null);
  const [calMonth,setCalMonth]=useState(new Date());
  const [briefing,setBriefing]=useState(null);
  const [briefLoading,setBriefLoading]=useState(false);
  const [searchQ,setSearchQ]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [apiKeyVal,setApiKeyVal]=useState(localStorage.getItem(API_KEY_KEY)||"");
  const [proxyVal,setProxyVal]=useState(localStorage.getItem(PROXY_KEY)||"");
  const [testResult,setTestResult]=useState(null);
  const [testing,setTesting]=useState(false);
  const saveKey=v=>{const c=v.trim();setApiKeyVal(c);localStorage.setItem(API_KEY_KEY,c)};
  const saveProxy=v=>{setProxyVal(v);localStorage.setItem(PROXY_KEY,v.trim())};

  useEffect(()=>{saveData(data)},[data]);
  const update=(key,fn)=>setData(prev=>({...prev,[key]:typeof fn==="function"?fn(prev[key]):fn}));

  useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setShowCapture(true)}};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h)},[]);

  useEffect(()=>{try{const c=localStorage.getItem("synapse-digest");if(c){const cb=JSON.parse(c);setBriefing(cb.data)}}catch(e){}},[]);

  const refreshDigest=async()=>{setBriefLoading(true);const r=await aiDigest(tasks,projects,areas);if(r){setBriefing(r);localStorage.setItem("synapse-digest",JSON.stringify({data:r,time:now()}))}setBriefLoading(false)};

  const handleCapture=async rawText=>{
    setShowCapture(false);
    const note={id:uid(),createdAt:now(),updatedAt:now(),touchedAt:now(),rawText,source:"capture",processed:false,extractedIds:[],areaIds:[]};
    update("notes",prev=>[note,...prev]);
    setToast({message:"Note saved",type:"success"});
    setAiLoading(true);
    const result=await aiParseCapture(rawText,areas,projects,notes.slice(0,5));
    setAiLoading(false);
    if(result?.tasks?.length>0) setReview(result);
    else if(!result) setToast({message:"AI error: "+(window._lastAiError||"unavailable"),type:"warning"});
    else setToast({message:"No tasks extracted",type:"info"});
    if(getApiKey()){const props=await aiProposeProjects([note,...notes],areas);if(props?.length>0)update("proposals",prev=>[...props.map(p=>({...p,id:uid(),status:"pending",createdAt:now()})),...prev])}
  };

  const handleAcceptTasks=selected=>{
    const newTasks=selected.map(item=>({id:uid(),name:item.name,projectId:item.projectId||null,areaId:item.areaId||areas[0]?.id,status:"Not Started",priority:item.priority||"Medium",effort:item.effort||"M",due:item.due||null,recurrence:null,notes:"",sourceNoteId:notes[0]?.id||null,createdAt:now(),updatedAt:now(),touchedAt:now(),aiConfidence:item.confidence,aiProposed:true}));
    update("tasks",prev=>[...newTasks,...prev]);
    if(notes[0])update("notes",prev=>prev.map((n,i)=>i===0?{...n,processed:true,extractedIds:newTasks.map(t=>t.id)}:n));
    setReview(null);setToast({message:`${newTasks.length} tasks created`,type:"success"});
  };

  const saveTask=t=>update("tasks",prev=>prev.map(x=>x.id===t.id?t:x));
  const deleteTask=id=>{update("tasks",prev=>prev.filter(x=>x.id!==id));if(panel?.item?.id===id)setPanel(null)};
  const addTask=t=>{const n={...t,id:uid()};update("tasks",prev=>[n,...prev]);return n};
  const saveProject=p=>update("projects",prev=>prev.map(x=>x.id===p.id?p:x));
  const deleteProject=id=>{update("projects",prev=>prev.filter(x=>x.id!==id));update("tasks",prev=>prev.map(t=>t.projectId===id?{...t,projectId:null}:t));setPanel(null)};
  const addProject=p=>{const n={...p,id:uid(),createdAt:now(),updatedAt:now(),touchedAt:now()};update("projects",prev=>[n,...prev]);return n};
  const completeTask=t=>{
    const updated=touchNow({...t,status:"Complete"});
    update("tasks",prev=>{const list=prev.map(x=>x.id===t.id?updated:x);if(t.recurrence&&t.status!=="Complete"){const nd=getNextDue(t.due,t.recurrence);if(nd&&(!t.recurrenceEnd||nd<=t.recurrenceEnd))return[...list,{...t,id:uid(),status:"Not Started",due:nd,createdAt:now(),updatedAt:now(),touchedAt:now()}]}return list});
  };
  const handleCalDrop=(taskId,newDay)=>{const yr=calMonth.getFullYear(),mn=calMonth.getMonth();const d=yr+"-"+String(mn+1).padStart(2,"0")+"-"+String(newDay).padStart(2,"0");update("tasks",prev=>prev.map(x=>x.id===taskId?touchNow({...x,due:d}):x))};

  useEffect(()=>{if(panel){const src=panel.type==="project"?projects:tasks;const u=src.find(x=>x.id===panel.item.id);if(u&&JSON.stringify(u)!==JSON.stringify(panel.item))setPanel({...panel,item:u})}},[projects,tasks]);

  const inboxCount=proposals.filter(p=>p.status==="pending").length;
  const forgottenCount=tasks.filter(t=>isForgotten(t)).length;
  const sectionTitle=(title,sub)=><div style={{marginBottom:20}}><h1 style={{fontSize:22,fontWeight:700}}>{title}</h1>{sub&&<p style={{fontSize:13,color:"var(--text-secondary)",marginTop:2}}>{sub}</p>}</div>;

  return <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
    {panel&&<div onClick={()=>setPanel(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:999}}/>}
    {showCapture&&<CaptureModal onCommit={handleCapture} onClose={()=>setShowCapture(false)}/>}
    {review&&<ReviewCard result={review} areas={areas} onAccept={handleAcceptTasks} onDismiss={()=>setReview(null)}/>}
    {toast&&<Toast message={toast.message} type={toast.type} onDismiss={()=>setToast(null)}/>}

    {/* SIDEBAR */}
    <div style={{width:240,background:"var(--surface)",borderRight:"1px solid var(--border)",padding:"16px 12px",display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"4px 8px",marginBottom:20}}>
        <div style={{width:32,height:32,borderRadius:8,background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🧠</div>
        <div style={{fontSize:15,fontWeight:700}}>Synapse</div>
      </div>

      <button onClick={()=>setShowCapture(true)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderRadius:8,border:"1px solid var(--accent)40",background:"var(--accent-soft)",color:"var(--accent)",fontSize:13,fontWeight:500,cursor:"pointer",width:"100%",textAlign:"left",marginBottom:20}}>
        <span>⚡</span>Quick Capture<span style={{marginLeft:"auto",fontSize:10,fontFamily:"var(--mono)",color:"var(--text-dim)"}}>⌘K</span>
      </button>

      <div style={{fontSize:10,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:1,padding:"0 12px",marginBottom:6}}>Views</div>
      <NavItem icon="⚡" label="Capture" active={view==="capture"} onClick={()=>setView("capture")}/>
      <NavItem icon="🕐" label="Stream" active={view==="stream"} onClick={()=>setView("stream")}/>
      <NavItem icon="📝" label="Notes" active={view==="notes"} onClick={()=>setView("notes")} count={notes.length}/>
      <NavItem icon="✓" label="Tasks" active={view==="tasks"} onClick={()=>setView("tasks")} count={tasks.filter(t=>t.status!=="Complete").length}/>
      <NavItem icon="📁" label="Projects" active={view==="projects"} onClick={()=>setView("projects")} count={projects.length}/>
      <NavItem icon="▣" label="Board" active={view==="board"} onClick={()=>setView("board")}/>
      <NavItem icon="📅" label="Calendar" active={view==="calendar"} onClick={()=>setView("calendar")}/>

      <div style={{fontSize:10,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:1,padding:"0 12px",margin:"16px 0 6px"}}>AI</div>
      <NavItem icon="📊" label="Dashboard" active={view==="dashboard"} onClick={()=>setView("dashboard")}/>
      <NavItem icon="☀" label="Digest" active={view==="digest"} onClick={()=>setView("digest")} count={forgottenCount}/>
      <NavItem icon="📥" label="Inbox" active={view==="inbox"} onClick={()=>setView("inbox")} count={inboxCount}/>

      <div style={{flex:1}}/>
      <NavItem icon="⚙" label="Settings" active={view==="settings"} onClick={()=>setView("settings")}/>
    </div>

    {/* MAIN */}
    <div style={{flex:1,padding:"24px 32px",overflowY:"auto"}}>

      {/* CAPTURE */}
      {view==="capture"&&<>
        {sectionTitle("Capture","⌘K to dump from anywhere")}
        <Card style={{textAlign:"center",padding:"48px 32px",cursor:"pointer",border:"1px dashed var(--border)"}} onClick={()=>setShowCapture(true)}>
          <div style={{fontSize:32,marginBottom:12}}>⚡</div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Start a mind dump</div>
          <div style={{fontSize:13,color:"var(--text-secondary)"}}>Click or press ⌘K</div>
          {aiLoading&&<div style={{marginTop:12,color:"var(--accent)",fontSize:12}}>AI processing...</div>}
        </Card>
        {notes.length>0&&<div style={{marginTop:24}}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--text-dim)",marginBottom:8}}>Recent</div>
          {notes.slice(0,5).map(n=><Card key={n.id} style={{marginBottom:6,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text-dim)"}}>{fmtFull(n.createdAt)}</span>
              {n.extractedIds.length>0&&<Badge color="var(--green)">{n.extractedIds.length} tasks</Badge>}
            </div>
            <div style={{fontSize:13,color:"var(--text-secondary)",fontFamily:"var(--mono)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{n.rawText.slice(0,200)}{n.rawText.length>200?"...":""}</div>
          </Card>)}
        </div>}
      </>}

      {/* STREAM */}
      {view==="stream"&&<>
        {sectionTitle("Stream","Everything, chronological")}
        {(()=>{
          const all=[...notes.map(n=>({...n,_type:"note",_ts:n.createdAt})),...tasks.map(t=>({...t,_type:"task",_ts:t.createdAt})),...projects.map(p=>({...p,_type:"project",_ts:p.createdAt}))].sort((a,b)=>new Date(b._ts)-new Date(a._ts));
          const grouped={};all.forEach(item=>{const day=item._ts?.slice(0,10)||"?";if(!grouped[day])grouped[day]=[];grouped[day].push(item)});
          return Object.entries(grouped).map(([day,items])=><div key={day} style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",marginBottom:6,fontFamily:"var(--mono)"}}>{day===new Date().toISOString().slice(0,10)?"Today":day}</div>
            {items.map(item=><div key={item.id} style={{display:"flex",gap:10,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,marginBottom:3,cursor:item._type!=="note"?"pointer":"default",fontSize:13}} onClick={()=>{if(item._type==="task")setPanel({type:"task",item});if(item._type==="project")setPanel({type:"project",item})}}>
              <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text-dim)",minWidth:40}}>{fmtTime(item._ts)}</span>
              <span style={{width:6,height:6,borderRadius:3,background:item._type==="note"?"var(--text-dim)":item._type==="task"?"var(--blue)":"var(--accent)",marginTop:5,flexShrink:0}}/>
              <div style={{flex:1}}><div style={{fontWeight:item._type==="note"?400:500}}>{item._type==="note"?item.rawText.slice(0,100):item.name}</div>
              <div style={{display:"flex",gap:4,marginTop:2}}><span style={{fontSize:10,color:"var(--text-dim)"}}>{item._type}</span>{item.status&&<Badge color={SC[item.status]} style={{fontSize:9,padding:"0 5px"}}>{item.status}</Badge>}</div></div>
            </div>)}
          </div>);
        })()}
        {!notes.length&&!tasks.length&&<Card style={{textAlign:"center",padding:48,color:"var(--text-secondary)"}}>Stream is empty. Hit ⌘K to start.</Card>}
      </>}

      {/* NOTES */}
      {view==="notes"&&<>
        {sectionTitle("Notes","Raw dumps, searchable")}
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search..." style={{width:"100%",maxWidth:360,padding:"8px 12px",borderRadius:8,border:"1px solid var(--border)",fontSize:13,background:"var(--surface)",color:"var(--text)",marginBottom:16,boxSizing:"border-box"}}/>
        {notes.filter(n=>!searchQ||n.rawText.toLowerCase().includes(searchQ.toLowerCase())).map(n=><Card key={n.id} style={{marginBottom:8,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text-dim)"}}>{fmtFull(n.createdAt)}</span>
            <div style={{display:"flex",gap:4}}>{n.extractedIds.length>0&&<Badge color="var(--green)">{n.extractedIds.length} tasks</Badge>}<Badge>{n.source}</Badge></div>
          </div>
          <div style={{fontSize:13,color:"var(--text)",fontFamily:"var(--mono)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{n.rawText}</div>
          {n.extractedIds.length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid var(--border)"}}>
            {tasks.filter(t=>n.extractedIds.includes(t.id)).map(t=><div key={t.id} onClick={()=>setPanel({type:"task",item:t})} style={{fontSize:12,color:"var(--accent)",cursor:"pointer",padding:"2px 0"}}>→ {t.name}</div>)}
          </div>}
          <div style={{textAlign:"right",marginTop:6}}><Btn variant="ghost" small onClick={()=>update("notes",prev=>prev.filter(x=>x.id!==n.id))}>Delete</Btn></div>
        </Card>)}
        {!notes.length&&<Card style={{textAlign:"center",padding:48,color:"var(--text-secondary)"}}>No notes yet. Hit ⌘K.</Card>}
      </>}

      {/* TASKS */}
      {view==="tasks"&&<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div><h1 style={{fontSize:22,fontWeight:700}}>Tasks</h1><p style={{fontSize:13,color:"var(--text-secondary)"}}>{tasks.filter(t=>t.status!=="Complete").length} active{forgottenCount>0&&` · ${forgottenCount} forgotten`}</p></div>
          <Btn small onClick={()=>{const t=addTask({name:"New Task",projectId:null,areaId:areas[0]?.id,status:"Not Started",priority:"Medium",effort:"M",due:null,notes:"",createdAt:now(),updatedAt:now(),touchedAt:now(),recurrence:null});setPanel({type:"task",item:t})}}>+ Task</Btn>
        </div>
        {tasks.sort((a,b)=>{if(a.status==="Complete"&&b.status!=="Complete")return 1;if(a.status!=="Complete"&&b.status==="Complete")return -1;if(isForgotten(a)&&!isForgotten(b))return -1;if(!isForgotten(a)&&isForgotten(b))return 1;return new Date(b.touchedAt||b.createdAt)-new Date(a.touchedAt||a.createdAt)}).map(t=>{
          const area=areas.find(a=>a.id===t.areaId);const forgotten=isForgotten(t);
          return <div key={t.id} onClick={()=>setPanel({type:"task",item:t})} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"var(--card)",border:`1px solid ${forgotten?"var(--yellow)25":"var(--border)"}`,borderRadius:8,marginBottom:3,cursor:"pointer"}}>
            <button onClick={e=>{e.stopPropagation();if(t.status!=="Complete")completeTask(t);else saveTask(touchNow({...t,status:"Not Started"}))}} style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${SC[t.status]}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,cursor:"pointer",background:t.status==="Complete"?SC[t.status]:"transparent",color:"#fff"}}>{t.status==="Complete"?"✓":""}</button>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:500,textDecoration:t.status==="Complete"?"line-through":"none",color:t.status==="Complete"?"var(--text-dim)":"var(--text)"}}>{t.name}</div>
              <div style={{display:"flex",gap:4,marginTop:3,alignItems:"center"}}>
                {area&&<Badge color={area.color} style={{fontSize:10,padding:"0 6px"}}>{area.icon} {area.name}</Badge>}
                {t.due&&<span style={{fontFamily:"var(--mono)",fontSize:10,color:t.due<new Date().toISOString().slice(0,10)&&t.status!=="Complete"?"var(--red)":"var(--text-dim)"}}>Due {fmt(t.due)}</span>}
                {forgotten&&<Badge color="var(--yellow)" style={{fontSize:10,padding:"0 6px"}}>{daysSince(t.touchedAt||t.createdAt)}d untouched</Badge>}
              </div>
            </div>
            <span style={{width:6,height:6,borderRadius:3,background:PC[t.priority]}} title={t.priority}/>
            <span style={{fontSize:11,fontWeight:600,color:EC[t.effort],fontFamily:"var(--mono)"}}>{t.effort}</span>
          </div>;
        })}
        {!tasks.length&&<Card style={{textAlign:"center",padding:48,color:"var(--text-secondary)"}}>No tasks yet.</Card>}
      </>}

      {/* PROJECTS */}
      {view==="projects"&&<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div><h1 style={{fontSize:22,fontWeight:700}}>Projects</h1><p style={{fontSize:13,color:"var(--text-secondary)"}}>{projects.filter(p=>p.status!=="Complete").length} active</p></div>
          <Btn small onClick={()=>{const p=addProject({name:"New Project",areaId:areas[0]?.id,status:"Not Started",priority:"Medium",effort:"M",due:null,notes:""});setPanel({type:"project",item:p})}}>+ Project</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
          {projects.map(p=>{const area=areas.find(a=>a.id===p.areaId);const linked=tasks.filter(t=>t.projectId===p.id);const done=linked.filter(t=>t.status==="Complete").length;const prog=linked.length?Math.round(done/linked.length*100):0;
            return <Card key={p.id} style={{cursor:"pointer",borderLeft:`3px solid ${area?.color||"var(--text-dim)"}`}} onClick={()=>setPanel({type:"project",item:p})}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div style={{fontSize:14,fontWeight:600}}>{p.name}</div><Badge color={SC[p.status]} style={{fontSize:10}}>{p.status}</Badge></div>
              {area&&<Badge color={area.color} style={{fontSize:10,marginBottom:8}}>{area.icon} {area.name}</Badge>}
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8}}><div style={{flex:1,height:3,borderRadius:2,background:"var(--border)",overflow:"hidden"}}><div style={{width:`${prog}%`,height:"100%",background:area?.color||"var(--blue)"}}/></div><span style={{fontSize:10,color:"var(--text-dim)",fontFamily:"var(--mono)"}}>{done}/{linked.length}</span></div>
              {p.due&&<div style={{fontSize:11,color:"var(--text-dim)",marginTop:6}}>Due {fmt(p.due)}</div>}
            </Card>;
          })}
        </div>
        {!projects.length&&<Card style={{textAlign:"center",padding:48,color:"var(--text-secondary)"}}>No projects yet.</Card>}
      </>}

      {/* BOARD */}
      {view==="board"&&<>
        {sectionTitle("Board")}
        <div style={{display:"grid",gridTemplateColumns:`repeat(${STATUSES.length},1fr)`,gap:8,minHeight:"60vh"}}>
          {STATUSES.map(status=><div key={status} onDragOver={e=>e.preventDefault()} onDrop={e=>{const id=e.dataTransfer.getData("taskId");if(id)saveTask(touchNow({...tasks.find(t=>t.id===id),status}))}} style={{background:"var(--surface)",borderRadius:"var(--radius)",border:"1px solid var(--border)",padding:10}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,padding:"0 4px"}}><span style={{width:6,height:6,borderRadius:3,background:SC[status]}}/><span style={{fontSize:12,fontWeight:600}}>{status}</span><span style={{fontSize:10,color:"var(--text-dim)",fontFamily:"var(--mono)",marginLeft:"auto"}}>{tasks.filter(t=>t.status===status).length}</span></div>
            {tasks.filter(t=>t.status===status).map(t=>{const area=areas.find(a=>a.id===t.areaId);return <div key={t.id} draggable onDragStart={e=>e.dataTransfer.setData("taskId",t.id)} onClick={()=>setPanel({type:"task",item:t})} style={{padding:"8px 10px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,marginBottom:4,cursor:"grab",fontSize:12}}>
              <div style={{fontWeight:500,marginBottom:3}}>{t.name}</div>
              <div style={{display:"flex",gap:3,alignItems:"center"}}><span style={{width:5,height:5,borderRadius:3,background:PC[t.priority]}}/>{area&&<span style={{fontSize:10,color:area.color}}>{area.icon}</span>}{t.due&&<span style={{fontSize:10,color:"var(--text-dim)",fontFamily:"var(--mono)",marginLeft:"auto"}}>{fmt(t.due)}</span>}</div>
            </div>})}
          </div>)}
        </div>
      </>}

      {/* CALENDAR */}
      {view==="calendar"&&(()=>{
        const yr=calMonth.getFullYear(),mn=calMonth.getMonth();const fd=new Date(yr,mn,1).getDay();const dim=new Date(yr,mn+1,0).getDate();const today=new Date().toISOString().slice(0,10);const sp=(fd+6)%7;
        const days=[];for(let i=0;i<sp;i++)days.push(null);for(let i=1;i<=dim;i++)days.push(i);while(days.length%7)days.push(null);
        const allItems=[...tasks.filter(t=>t.due&&t.status!=="Complete").map(t=>({...t,itemType:"task"})),...tasks.filter(t=>t.recurrence&&t.due&&t.status!=="Complete").flatMap(t=>generateGhostDates(t.due,t.recurrence,yr+"-"+String(mn+2).padStart(2,"0")+"-01",5).map(d=>({...t,due:d,itemType:"ghost"})))];
        return <>{sectionTitle("Calendar")}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <Btn variant="secondary" small onClick={()=>setCalMonth(new Date(yr,mn-1,1))}>←</Btn>
            <span style={{fontWeight:600}}>{calMonth.toLocaleDateString("en-AU",{month:"long",year:"numeric"})}</span>
            <Btn variant="secondary" small onClick={()=>setCalMonth(new Date(yr,mn+1,1))}>→</Btn>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=><div key={d} style={{padding:6,textAlign:"center",fontSize:11,fontWeight:500,color:"var(--text-dim)"}}>{d}</div>)}
            {days.map((day,i)=>{if(!day)return <div key={i} style={{minHeight:72,background:"var(--surface)",borderRadius:6}}/>;
              const ds=yr+"-"+String(mn+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");const isToday=ds===today;const di=allItems.filter(item=>item.due===ds);
              return <div key={i} onDragOver={e=>e.preventDefault()} onDrop={e=>{const id=e.dataTransfer.getData("taskId");if(id)handleCalDrop(id,day)}} style={{minHeight:72,background:"var(--surface)",borderRadius:6,padding:"3px 5px",border:isToday?"1px solid var(--accent)30":"1px solid var(--border)"}}>
                <div style={{fontSize:11,fontWeight:isToday?600:400,color:isToday?"var(--accent)":"var(--text-dim)",fontFamily:"var(--mono)",marginBottom:2}}>{day}</div>
                {di.slice(0,3).map((item,j)=><div key={j} draggable={item.itemType!=="ghost"} onDragStart={e=>e.dataTransfer.setData("taskId",item.id)} onClick={()=>{if(item.itemType!=="ghost")setPanel({type:"task",item})}} style={{fontSize:9,padding:"1px 3px",borderRadius:3,marginBottom:1,background:item.itemType==="ghost"?"transparent":`${PC[item.priority]}18`,borderLeft:`2px solid ${item.itemType==="ghost"?"var(--text-dim)":PC[item.priority]}`,color:item.itemType==="ghost"?"var(--text-dim)":"var(--text)",cursor:item.itemType==="ghost"?"default":"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontStyle:item.itemType==="ghost"?"italic":"normal"}}>{item.name}</div>)}
                {di.length>3&&<div style={{fontSize:9,color:"var(--text-dim)"}}>+{di.length-3}</div>}
              </div>;
            })}
          </div>
        </>;
      })()}

      {/* DASHBOARD */}
      {view==="dashboard"&&<>
        {sectionTitle("Dashboard")}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:20}}>
          {[{l:"Active Tasks",v:tasks.filter(t=>t.status!=="Complete").length,c:"var(--blue)"},{l:"Forgotten",v:forgottenCount,c:"var(--yellow)"},{l:"Projects",v:projects.filter(p=>p.status!=="Complete").length,c:"var(--accent)"},{l:"Notes",v:notes.length,c:"var(--text-secondary)"},{l:"Proposals",v:inboxCount,c:"var(--green)"}].map((s,i)=><Card key={i} style={{padding:16}}>
            <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>{s.l}</div>
            <div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div>
          </Card>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Card><div style={{fontSize:13,fontWeight:600,marginBottom:12}}>By Status</div><Donut size={100} stroke={10} center={tasks.length} sub="total" segments={STATUSES.map(s=>({pct:tasks.length?(tasks.filter(t=>t.status===s).length/tasks.length)*100:0,color:SC[s]}))}/></Card>
          <Card><div style={{fontSize:13,fontWeight:600,marginBottom:12}}>By Area</div>{areas.map(a=>{const c=tasks.filter(t=>t.areaId===a.id&&t.status!=="Complete").length;return <div key={a.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><span style={{fontSize:12}}>{a.icon}</span><span style={{fontSize:12,flex:1}}>{a.name}</span><div style={{width:80,height:3,borderRadius:2,background:"var(--border)",overflow:"hidden"}}><div style={{width:`${Math.min(100,c*10)}%`,height:"100%",background:a.color}}/></div><span style={{fontSize:10,color:"var(--text-dim)",fontFamily:"var(--mono)",minWidth:16,textAlign:"right"}}>{c}</span></div>})}</Card>
        </div>
        {forgottenCount>0&&<Card style={{marginTop:12,borderColor:"var(--yellow)25"}}>
          <div style={{fontSize:13,fontWeight:600,color:"var(--yellow)",marginBottom:8}}>Forgotten ({forgottenCount})</div>
          {tasks.filter(t=>isForgotten(t)).slice(0,5).map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid var(--border)"}}><span style={{flex:1,fontSize:12}}>{t.name}</span><span style={{fontSize:10,color:"var(--yellow)",fontFamily:"var(--mono)"}}>{daysSince(t.touchedAt||t.createdAt)}d</span><Btn variant="secondary" small onClick={()=>saveTask(touchNow({...t}))}>Touch</Btn></div>)}
        </Card>}
      </>}

      {/* DIGEST */}
      {view==="digest"&&<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div><h1 style={{fontSize:22,fontWeight:700}}>Daily Digest</h1><p style={{fontSize:13,color:"var(--text-secondary)"}}>AI morning briefing</p></div>
          <Btn small onClick={refreshDigest} disabled={briefLoading}>{briefLoading?"Generating...":"Refresh"}</Btn>
        </div>
        {!briefing&&!briefLoading&&<Card style={{textAlign:"center",padding:48,color:"var(--text-secondary)"}}>Set API key in Settings, then click Refresh.</Card>}
        {briefLoading&&<Card style={{textAlign:"center",padding:48,color:"var(--accent)"}}>Generating...</Card>}
        {briefing&&<>
          {briefing.greeting&&<Card style={{marginBottom:10}}><div style={{fontSize:14,fontWeight:500}}>{briefing.greeting}</div></Card>}
          {briefing.today_focus?.length>0&&<Card style={{marginBottom:10}}><div style={{fontSize:12,fontWeight:600,color:"var(--blue)",marginBottom:8}}>Today's Focus</div>{briefing.today_focus.map((f,i)=><div key={i} style={{padding:"4px 0",fontSize:13,borderBottom:"1px solid var(--border)"}}>→ {f}</div>)}</Card>}
          {briefing.forgotten?.length>0&&<Card style={{marginBottom:10,borderColor:"var(--yellow)25"}}><div style={{fontSize:12,fontWeight:600,color:"var(--yellow)",marginBottom:8}}>You forgot about...</div>{briefing.forgotten.map((f,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:"1px solid var(--border)"}}><span style={{flex:1,fontSize:13}}>{f.name||f}</span>{f.days&&<span style={{fontSize:10,color:"var(--yellow)",fontFamily:"var(--mono)"}}>{f.days}d</span>}<Btn variant="secondary" small onClick={()=>{const t=tasks.find(t=>t.name===(f.name||f));if(t)saveTask(touchNow({...t}))}}>Touch</Btn></div>)}</Card>}
          {briefing.incoming?.length>0&&<Card style={{marginBottom:10}}><div style={{fontSize:12,fontWeight:600,color:"var(--accent)",marginBottom:8}}>Incoming</div>{briefing.incoming.map((f,i)=><div key={i} style={{padding:"4px 0",fontSize:13,borderBottom:"1px solid var(--border)"}}>{f.name||f}{f.due&&<span style={{fontSize:10,color:"var(--text-dim)",marginLeft:6}}>due {f.due}</span>}</div>)}</Card>}
          {briefing.recommendation&&<Card><div style={{fontSize:12,fontWeight:600,color:"var(--green)",marginBottom:8}}>Recommendation</div><div style={{fontSize:13,lineHeight:1.6}}>{briefing.recommendation}</div></Card>}
        </>}
      </>}

      {/* INBOX */}
      {view==="inbox"&&<>
        {sectionTitle("Inbox","AI proposals")}
        {proposals.filter(p=>p.status==="pending").map(prop=>{const area=areas.find(a=>a.id===prop.areaId);
          return <Card key={prop.id} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div style={{fontSize:14,fontWeight:600}}>{prop.suggestedName}</div><div style={{width:6,height:6,borderRadius:3,background:(prop.confidence||0)>=0.7?"var(--green)":"var(--yellow)",marginTop:6}} title={`${Math.round((prop.confidence||0)*100)}%`}/></div>
            {area&&<Badge color={area.color} style={{marginBottom:8}}>{area.icon} {area.name}</Badge>}
            {prop.themeSummary&&<div style={{fontSize:12,color:"var(--text-secondary)",lineHeight:1.5,marginBottom:10}}>{prop.themeSummary}</div>}
            <div style={{display:"flex",gap:6}}><Btn small onClick={()=>{addProject({name:prop.suggestedName,areaId:prop.areaId||areas[0]?.id,status:"Not Started",priority:"Medium",effort:"M",due:null,notes:prop.themeSummary||"",aiProposed:true});update("proposals",prev=>prev.map(x=>x.id===prop.id?{...x,status:"accepted"}:x));setToast({message:`Project "${prop.suggestedName}" created`,type:"success"})}}>Create Project</Btn><Btn variant="secondary" small onClick={()=>update("proposals",prev=>prev.map(x=>x.id===prop.id?{...x,status:"dismissed"}:x))}>Dismiss</Btn></div>
          </Card>;
        })}
        {!proposals.filter(p=>p.status==="pending").length&&<Card style={{textAlign:"center",padding:48,color:"var(--text-secondary)"}}>No pending proposals. AI suggests projects when it detects recurring themes.</Card>}
      </>}

      {/* SETTINGS */}
      {view==="settings"&&<>
        {sectionTitle("Settings")}

        <Card style={{maxWidth:520,marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>API Key</div>
          <div style={{fontSize:12,color:"var(--text-secondary)",marginBottom:10}}>Get from <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></div>
          <input type="text" value={apiKeyVal} onChange={e=>saveKey(e.target.value)} placeholder="sk-ant-api03-..." style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"1px solid var(--border)",fontSize:13,fontFamily:"var(--mono)",background:"var(--surface)",color:"var(--text)",boxSizing:"border-box",WebkitTextSecurity:"disc"}}/>
          <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"var(--mono)",marginTop:4}}>{apiKeyVal?`${apiKeyVal.length} chars · ${apiKeyVal.slice(0,12)}...`:"Not set"}</div>
          <div style={{display:"flex",gap:6,marginTop:8}}>
            <Btn variant="secondary" small onClick={async()=>{
              const key=apiKeyVal.trim().replace(/[^\x20-\x7E]/g,"");
              if(!key){setTestResult({ok:false,msg:"No key"});return}
              setTesting(true);setTestResult(null);
              try{const r=await fetch(getProxyUrl(),{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:10,messages:[{role:"user",content:"Say OK"}]})});
                const d=await r.json();if(d.error)setTestResult({ok:false,msg:d.error.message||d.error.type});else setTestResult({ok:true,msg:"Connected! "+((d.content?.[0]?.text)||"")})
              }catch(e){setTestResult({ok:false,msg:e.message})}setTesting(false);
            }}>{testing?"Testing...":"Test"}</Btn>
            <Btn variant="ghost" small onClick={()=>{saveKey("");setTestResult(null)}}>Clear</Btn>
          </div>
          {testResult&&<div style={{marginTop:8,padding:"6px 10px",borderRadius:6,fontSize:11,fontFamily:"var(--mono)",color:testResult.ok?"var(--green)":"var(--red)",background:testResult.ok?"rgba(34,197,94,0.08)":"rgba(239,68,68,0.08)",lineHeight:1.4}}>{testResult.ok?"✓":"✕"} {testResult.msg}</div>}
        </Card>

        <Card style={{maxWidth:520,marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>API Proxy</div>
          <div style={{fontSize:12,color:"var(--text-secondary)",marginBottom:10}}>If deployed to Vercel, leave empty (uses /api/proxy). Otherwise enter your proxy URL.</div>
          <input type="text" value={proxyVal} onChange={e=>saveProxy(e.target.value)} placeholder="/api/proxy (default)" style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"1px solid var(--border)",fontSize:13,fontFamily:"var(--mono)",background:"var(--surface)",color:"var(--text)",boxSizing:"border-box"}}/>
          <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"var(--mono)",marginTop:4}}>Using: {getProxyUrl()}</div>
        </Card>

        <Card style={{maxWidth:520,marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>Areas</div>
          {areas.map(a=><div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,marginBottom:4}}>
            <input value={a.icon} onChange={e=>update("areas",prev=>prev.map(x=>x.id===a.id?{...x,icon:e.target.value}:x))} style={{width:30,fontSize:14,textAlign:"center",background:"transparent",border:"none",color:"var(--text)"}}/>
            <input value={a.name} onChange={e=>update("areas",prev=>prev.map(x=>x.id===a.id?{...x,name:e.target.value}:x))} style={{flex:1,fontSize:13,fontWeight:500,background:"transparent",border:"none",color:"var(--text)",outline:"none"}}/>
            <div style={{display:"flex",gap:2}}>{AREA_SWATCHES.map(sw=><button key={sw} onClick={()=>update("areas",prev=>prev.map(x=>x.id===a.id?{...x,color:sw}:x))} style={{width:14,height:14,borderRadius:4,background:sw,border:a.color===sw?"2px solid var(--text)":"1px solid var(--border)",cursor:"pointer"}}/>)}</div>
            <button onClick={()=>update("areas",prev=>prev.filter(x=>x.id!==a.id))} style={{background:"none",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:14}}>×</button>
          </div>)}
          <Btn variant="secondary" small style={{marginTop:6}} onClick={()=>update("areas",prev=>[...prev,{id:uid(),name:"New Area",color:AREA_SWATCHES[prev.length%AREA_SWATCHES.length],icon:"📌",keywords:[],userCreated:true}])}>+ Add Area</Btn>
          <div style={{marginTop:10}}><div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>Keywords</div>
            {areas.map(a=><div key={a.id} style={{marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:11,color:a.color,fontWeight:500,minWidth:60}}>{a.name}</span>
              <input value={(a.keywords||[]).join(", ")} onChange={e=>update("areas",prev=>prev.map(x=>x.id===a.id?{...x,keywords:e.target.value.split(",").map(k=>k.trim()).filter(Boolean)}:x))} placeholder="keyword1, keyword2" style={{flex:1,fontSize:11,padding:"3px 6px",borderRadius:4,border:"1px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontFamily:"var(--mono)"}}/>
            </div>)}
          </div>
        </Card>

        <Card style={{maxWidth:520}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>Data</div>
          <div style={{display:"flex",gap:6}}>
            <Btn variant="secondary" small onClick={()=>{const d=JSON.stringify(data,null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="synapse-"+new Date().toISOString().slice(0,10)+".json";a.click()}}>Export</Btn>
            <Btn variant="secondary" small onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const reader=new FileReader();reader.onload=ev=>{try{setData(JSON.parse(ev.target.result));setToast({message:"Imported",type:"success"})}catch(err){setToast({message:"Invalid file",type:"error"})}};reader.readAsText(e.target.files[0])};inp.click()}}>Import</Btn>
            <Btn variant="danger" small onClick={()=>{if(confirm("Wipe all data?")){localStorage.removeItem(STORAGE_KEY);localStorage.removeItem("synapse-digest");location.reload()}}}>Wipe</Btn>
          </div>
        </Card>
      </>}
    </div>

    {panel&&<DetailPanel type={panel.type} item={panel.item} areas={areas} onClose={()=>setPanel(null)} onSave={panel.type==="project"?saveProject:saveTask} onDelete={panel.type==="project"?deleteProject:deleteTask} tasks={tasks} projects={projects} onSaveTask={saveTask} onDeleteTask={deleteTask} onAddTask={addTask} onOpenTask={t=>setPanel({type:"task",item:t})}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
