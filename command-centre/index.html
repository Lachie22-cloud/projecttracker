<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --surface: #0f0f12;
    --card: #141418;
    --card-hover: #1a1a20;
    --border: rgba(255,255,255,0.06);
    --border-active: rgba(255,255,255,0.12);
    --accent: #d4a853;
    --accent-soft: rgba(212,168,83,0.10);
    --accent-glow: rgba(212,168,83,0.04);
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --text: #e4e4e7;
    --text-secondary: #71717a;
    --text-dim: #3f3f46;
    --radius: 10px;
    --font: 'Inter', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: var(--mono); background: var(--bg); color: var(--text); overflow: hidden; font-size: 13px; }
  #root { min-height: 100vh; }

  /* Dot grid background */
  .dot-bg {
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.04); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.08); }
  ::selection { background: rgba(212,168,83,0.2); }
  input, textarea, select, button { font-family: inherit; font-size: inherit; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
  a { color: var(--accent); text-decoration: none; }

  /* Hover transitions */
  .hoverable { transition: background 0.15s, border-color 0.15s, transform 0.1s; }
  .hoverable:hover { background: var(--card-hover); border-color: var(--border-active); }

  /* Subtle glow on active nav */
  .nav-active { position: relative; }
  .nav-active::before {
    content: '';
    position: absolute;
    left: 0; top: 50%; transform: translateY(-50%);
    width: 2px; height: 16px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.2s ease-out; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .pulse { animation: pulse 2s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================================
// CONSTANTS
// ============================================================
const STORAGE_KEY = "pcc-v9-synapse";
const API_KEY_KEY = "synapse-api-key";
const PROXY_KEY = "synapse-proxy-url";

(() => { if (!localStorage.getItem(API_KEY_KEY)) { const old = localStorage.getItem("pcc-api-key"); if (old) localStorage.setItem(API_KEY_KEY, old); } })();

function uid() { return "id_" + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function now() { return new Date().toISOString(); }
function touchNow(item) { return { ...item, touchedAt: now(), updatedAt: now() }; }
function daysSince(ts) { if (!ts) return 999; return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000); }
function isForgotten(item, n=7) { return item.status !== "Complete" && daysSince(item.touchedAt || item.updatedAt || item.createdAt) > n; }
function fmt(ts) { if (!ts) return ""; return new Date(ts).toLocaleDateString("en-AU",{day:"numeric",month:"short"}); }
function fmtTime(ts) { if (!ts) return ""; return new Date(ts).toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit",hour12:false}); }
function fmtFull(ts) { if (!ts) return ""; return fmt(ts) + " " + fmtTime(ts); }
function relTime(ts) {
  if (!ts) return "";
  const d = daysSince(ts);
  if (d === 0) return "today";
  if (d === 1) return "yesterday";
  if (d < 7) return d + "d ago";
  if (d < 30) return Math.floor(d/7) + "w ago";
  return Math.floor(d/30) + "mo ago";
}

function getNextDue(due, recurrence) {
  if (!due || !recurrence) return null;
  const d = new Date(due + "T00:00:00");
  if (recurrence === "daily") d.setDate(d.getDate() + 1);
  else if (recurrence === "weekly") d.setDate(d.getDate() + 7);
  else if (recurrence === "monthly") d.setMonth(d.getMonth() + 1);
  else if (recurrence?.type === "custom") d.setDate(d.getDate() + (recurrence.days || 7));
  return d.toISOString().slice(0, 10);
}
function getRecurrenceLabel(rec) {
  if (!rec) return null;
  if (rec === "daily") return "daily"; if (rec === "weekly") return "weekly"; if (rec === "monthly") return "monthly";
  if (rec?.type === "custom") return "every " + rec.days + "d"; return null;
}
function generateGhostDates(due, recurrence, endDate, limit) {
  if (!due || !recurrence) return [];
  const dates = []; let current = due;
  for (let i = 0; i < (limit||12); i++) { const next = getNextDue(current, recurrence); if (!next || next > (endDate||"2027-12-31")) break; dates.push(next); current = next; }
  return dates;
}

const STATUSES = ["Not Started","In Progress","On Hold","Complete"];
const SC = {"Not Started":"#3f3f46","In Progress":"#60a5fa","On Hold":"#fbbf24","Complete":"#34d399"};
const PRIORITIES = ["Critical","High","Medium","Low"];
const PC = {Critical:"#f87171",High:"#fb923c",Medium:"#fbbf24",Low:"#71717a"};
const EFFORTS = ["S","M","L","XL"];
const EC = {S:"#34d399",M:"#60a5fa",L:"#fbbf24",XL:"#f87171"};

const DEFAULT_AREAS = [
  { id:"work", name:"Work", color:"#60a5fa", icon:"W", keywords:["meeting","report","email","slides","review","deadline"], userCreated:false },
  { id:"personal", name:"Personal", color:"#d4a853", icon:"P", keywords:["home","errand","health","appointment","call"], userCreated:false },
  { id:"ideas", name:"Ideas", color:"#a78bfa", icon:"I", keywords:["idea","think","explore","research","blog","write"], userCreated:false },
];
const AREA_SWATCHES = ["#d4a853","#60a5fa","#34d399","#fbbf24","#a78bfa","#fb923c","#22d3ee","#f472b6"];
const AREA_ICONS = ["W","P","I","D","R","H","S","C","L","X"];

// ============================================================
// DATA
// ============================================================
function loadData() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e){} return { notes:[], tasks:[], projects:[], areas:DEFAULT_AREAS, proposals:[] }; }
function saveData(data) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){} }
function getApiKey() { const r = localStorage.getItem(API_KEY_KEY); if (!r) return null; return r.trim().replace(/[^\x20-\x7E]/g,""); }
function getProxyUrl() { return (localStorage.getItem(PROXY_KEY)||"").trim() || "/api/proxy"; }

// ============================================================
// AI
// ============================================================
async function aiCall(body) {
  const apiKey = getApiKey();
  if (!apiKey) return null;
  try {
    const r = await fetch(getProxyUrl(), {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message || d.error.type || JSON.stringify(d.error));
    return d;
  } catch(e) { console.error("AI error:", e); window._lastAiError = e.message; return null; }
}

async function aiParseCapture(rawText, areas, projects, recentNotes) {
  const today = new Date().toISOString().slice(0,10);
  const areaCtx = areas.map(a => `${a.name}(id:${a.id}): keywords=[${a.keywords.join(",")}]`).join("; ");
  const projCtx = projects.filter(p=>p.status!=="Complete").map(p=>`"${p.name}"(id:${p.id})`).join(", ");
  const d = await aiCall({
    model:"claude-sonnet-4-20250514", max_tokens:2000,
    messages:[{role:"user",content:`You are a second-brain parser. Extract structured tasks from a mind dump. Be domain-agnostic.\n\nAreas: ${areaCtx}\nActive projects: ${projCtx||"none"}\nToday: ${today}\n\nReturn ONLY valid JSON:\n{"tasks":[{"name":"task","priority":"Critical|High|Medium|Low","effort":"S|M|L|XL","areaId":"id or null","projectId":"id or null","due":"YYYY-MM-DD or null","confidence":0.0-1.0,"sourceSpan":"original text"}],"thoughts":["non-actionable observations"],"summary":"one-line summary"}\n\nMind dump:\n${rawText}`}]
  });
  if (!d) return null;
  try { return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim()); } catch(e) { return null; }
}

async function aiDigest(tasks, projects, areas) {
  const today = new Date().toISOString().slice(0,10);
  const tData = tasks.map(t => `[${t.status}] "${t.name}" (priority:${t.priority}, due:${t.due||"none"}, touched:${daysSince(t.touchedAt||t.createdAt)}d${isForgotten(t)?", FORGOTTEN":""})`).join("\n");
  const pData = projects.map(p => `[${p.status}] "${p.name}" (priority:${p.priority}, due:${p.due||"none"}, touched:${daysSince(p.touchedAt||p.createdAt)}d)`).join("\n");
  const d = await aiCall({
    model:"claude-sonnet-4-20250514", max_tokens:1500,
    messages:[{role:"user",content:`You are a daily digest assistant. Today: ${today}. Rules: forgotten=not Complete + untouched >7d, incoming=due within 3d, stalled=On Hold >14d.\n\nTASKS:\n${tData||"none"}\n\nPROJECTS:\n${pData||"none"}\n\nReturn ONLY valid JSON:\n{"greeting":"one-liner","today_focus":["items"],"forgotten":[{"name":"x","days":0}],"incoming":[{"name":"x","due":"date"}],"stalled":[{"name":"x"}],"wins":["items"],"risk_areas":["items"],"recommendation":"paragraph"}`}]
  });
  if (!d) return null;
  try { return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim()); } catch(e) { return null; }
}

async function aiProposeProjects(notes, areas) {
  const unlinked = notes.filter(n => !n.extractedIds?.length).slice(-20);
  if (unlinked.length < 3) return [];
  const noteCtx = unlinked.map(n => `[${n.createdAt}] ${n.rawText.slice(0,200)}`).join("\n");
  const d = await aiCall({
    model:"claude-sonnet-4-20250514", max_tokens:1000,
    messages:[{role:"user",content:`Look at these notes. Find recurring themes (3+ notes) that should be a Project. If not confident, return [].\n\nAreas: ${areas.map(a=>`${a.name}(${a.id})`).join(", ")}\nNotes:\n${noteCtx}\n\nReturn ONLY JSON array:\n[{"suggestedName":"name","areaId":"id","themeSummary":"why","confidence":0.0-1.0}]`}]
  });
  if (!d) return [];
  try { return JSON.parse((d.content?.[0]?.text||"[]").replace(/```json|```/g,"").trim()); } catch(e) { return []; }
}

// ============================================================
// UI PRIMITIVES
// ============================================================
const Card = ({children, style={}, hover=false, onClick}) => (
  <div className={hover ? "hoverable" : ""} onClick={onClick} style={{
    background:"var(--card)", border:"1px solid var(--border)", borderRadius:"var(--radius)",
    padding:16, cursor: onClick ? "pointer" : "default", ...style
  }}>{children}</div>
);

const Tag = ({children, color="var(--text-dim)", style={}}) => (
  <span style={{
    display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",
    borderRadius:4,fontSize:11,fontWeight:500,color,
    border:`1px solid ${color}25`,background:`${color}08`,
    letterSpacing:"0.02em",whiteSpace:"nowrap",...style
  }}>{children}</span>
);

function Btn({children,onClick,variant="primary",small,disabled,style={}}) {
  const base = {padding:small?"4px 10px":"7px 14px",borderRadius:6,fontSize:12,fontWeight:500,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,transition:"all 0.15s",letterSpacing:"0.01em"};
  const variants = {
    primary: {background:"var(--accent)",color:"#000",border:"none",fontWeight:600},
    secondary: {background:"transparent",color:"var(--text-secondary)",border:"1px solid var(--border)"},
    danger: {background:"transparent",color:"var(--red)",border:"1px solid rgba(248,113,113,0.2)"},
    ghost: {background:"transparent",color:"var(--text-secondary)",border:"none",padding:small?"4px 6px":"7px 10px"},
  };
  return <button onClick={onClick} disabled={disabled} style={{...base,...variants[variant],...style}}>{children}</button>;
}

function NavItem({label,active,onClick,count,shortcut}) {
  return <button onClick={onClick} className={active?"nav-active":""} style={{
    display:"flex",alignItems:"center",gap:8,padding:"7px 12px 7px 14px",borderRadius:6,border:"none",
    background:active?"var(--accent-soft)":"transparent",
    color:active?"var(--accent)":"var(--text-secondary)",
    fontSize:12,fontWeight:active?500:400,cursor:"pointer",width:"100%",textAlign:"left",
    transition:"all 0.12s",position:"relative",letterSpacing:"0.02em"
  }}>
    <span style={{flex:1}}>{label}</span>
    {count>0&&<span style={{fontSize:10,color:active?"var(--accent)":"var(--text-dim)",opacity:0.8}}>{count}</span>}
    {shortcut&&<span style={{fontSize:9,color:"var(--text-dim)",letterSpacing:"0.05em"}}>{shortcut}</span>}
  </button>;
}

function Donut({size=100,stroke=10,segments,center,sub}) {
  const r=(size-stroke)/2, c=2*Math.PI*r; let offset=0;
  return <div style={{position:"relative",width:size,height:size}}>
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth={stroke}/>
    {segments.map((s,i)=>{const dash=(s.pct/100)*c;const o=offset;offset+=dash;return <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={stroke} strokeDasharray={`${dash} ${c-dash}`} strokeDashoffset={-o} style={{transition:"all 0.5s"}}/>;})}</svg>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:size*0.18,fontWeight:700,fontFamily:"var(--font)"}}>{center}</div>{sub&&<div style={{fontSize:size*0.09,color:"var(--text-secondary)"}}>{sub}</div>}</div>
  </div>;
}

function Toast({message,type="info",onDismiss}) {
  const c = {info:"var(--blue)",error:"var(--red)",success:"var(--green)",warning:"var(--yellow)"};
  useEffect(()=>{const t=setTimeout(onDismiss,4000);return()=>clearTimeout(t)},[]);
  return <div className="fade-in" style={{position:"fixed",bottom:36,right:16,background:"var(--card)",border:`1px solid ${c[type]}30`,padding:"8px 14px",borderRadius:8,fontSize:12,zIndex:9999,maxWidth:360,display:"flex",alignItems:"center",gap:8,color:"var(--text)",backdropFilter:"blur(12px)"}}>
    <span style={{width:5,height:5,borderRadius:"50%",background:c[type],flexShrink:0}}/>{message}
  </div>;
}

// ============================================================
// COMMAND LINE CAPTURE
// ============================================================
function CaptureModal({onCommit,onClose}) {
  const [text,setText]=useState(""); const ref=useRef(null);
  useEffect(()=>{ref.current?.focus()},[]);
  const handleKey=(e)=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){e.preventDefault();if(text.trim())onCommit(text.trim())} if(e.key==="Escape")onClose(); };
  const lines = text.trim().split("\n").filter(l=>l.trim()).length;
  return <div style={{position:"fixed",inset:0,zIndex:5000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"15vh",backdropFilter:"blur(20px)",background:"rgba(0,0,0,0.75)"}} onClick={onClose}>
    <div className="fade-in" onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:600,margin:"0 20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <span style={{color:"var(--accent)",fontSize:13,fontWeight:600}}>~</span>
        <span style={{color:"var(--text-dim)",fontSize:12}}>synapse capture</span>
        <span style={{flex:1}}/>
        <span style={{fontSize:10,color:"var(--text-dim)"}}>ctrl+enter commit / esc close</span>
      </div>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderBottom:"1px solid var(--border)"}}>
          <span style={{color:"var(--accent)",fontSize:12}}>{">"}</span>
          <span style={{fontSize:11,color:"var(--text-dim)"}}>mind dump</span>
        </div>
        <textarea ref={ref} value={text} onChange={e=>setText(e.target.value)} onKeyDown={handleKey}
          placeholder="what's on your mind..."
          style={{width:"100%",minHeight:140,padding:"12px 14px",background:"transparent",border:"none",color:"var(--text)",fontSize:13,fontFamily:"var(--mono)",lineHeight:1.8,resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",borderTop:"1px solid var(--border)",background:"var(--card)"}}>
          <span style={{fontSize:11,color:"var(--text-dim)"}}>{lines} line{lines!==1?"s":""}</span>
          <div style={{display:"flex",gap:4}}>
            <Btn variant="ghost" small onClick={onClose}>cancel</Btn>
            <Btn small onClick={()=>text.trim()&&onCommit(text.trim())} disabled={!text.trim()}>commit</Btn>
          </div>
        </div>
      </div>
    </div>
  </div>;
}

// ============================================================
// REVIEW CARD
// ============================================================
function ReviewCard({result,areas,onAccept,onDismiss}) {
  const [items,setItems]=useState((result.tasks||[]).map((t,i)=>({...t,_id:uid(),_selected:true})));
  const edit=(id,k,v)=>setItems(p=>p.map(x=>x._id===id?{...x,[k]:v}:x));
  const toggle=id=>setItems(p=>p.map(x=>x._id===id?{...x,_selected:!x._selected}:x));
  return <div className="fade-in" style={{position:"fixed",bottom:28,left:220,right:0,zIndex:4000,background:"var(--surface)",borderTop:"1px solid var(--border)",padding:"14px 20px",maxHeight:"50vh",overflowY:"auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div>
        <span style={{fontSize:12,fontWeight:600}}>extracted {items.length} tasks</span>
        {result.summary&&<span style={{fontSize:11,color:"var(--text-secondary)",marginLeft:8}}>{result.summary}</span>}
      </div>
      <div style={{display:"flex",gap:4}}>
        <Btn variant="ghost" small onClick={onDismiss}>discard</Btn>
        <Btn small onClick={()=>onAccept(items.filter(i=>i._selected))}>accept ({items.filter(i=>i._selected).length})</Btn>
      </div>
    </div>
    {items.map(item=>{const area=areas.find(a=>a.id===item.areaId);const conf=item.confidence||0;
      return <div key={item._id} className="hoverable" style={{display:"flex",gap:8,padding:"8px 10px",background:"var(--card)",border:`1px solid ${item._selected?"var(--accent)18":"var(--border)"}`,borderRadius:6,marginBottom:3,opacity:item._selected?1:0.35,transition:"all 0.15s"}}>
        <button onClick={()=>toggle(item._id)} style={{width:16,height:16,borderRadius:3,border:`1.5px solid ${item._selected?"var(--accent)":"var(--text-dim)"}`,background:item._selected?"var(--accent)":"transparent",color:"#000",fontSize:9,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:1,fontWeight:700}}>{item._selected?"\u2713":""}</button>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
            <input value={item.name} onChange={e=>edit(item._id,"name",e.target.value)} style={{flex:1,fontSize:12,fontWeight:500,background:"transparent",border:"none",color:"var(--text)",outline:"none",fontFamily:"var(--mono)"}}/>
            <span style={{width:5,height:5,borderRadius:"50%",background:conf>=0.8?"var(--green)":conf>=0.6?"var(--yellow)":"var(--red)"}} title={`${Math.round(conf*100)}%`}/>
          </div>
          {item.sourceSpan&&<div style={{fontSize:10,color:"var(--text-dim)",marginBottom:3,fontStyle:"italic"}}>"{item.sourceSpan}"</div>}
          <div style={{display:"flex",gap:3}}>{area&&<Tag color={area.color}>{area.name}</Tag>}<Tag color={PC[item.priority]}>{item.priority}</Tag>{item.due&&<Tag color="var(--text-secondary)">due {fmt(item.due)}</Tag>}</div>
        </div>
      </div>;
    })}
  </div>;
}

// ============================================================
// DETAIL PANEL
// ============================================================
function DetailPanel({type,item,areas,onClose,onSave,onDelete,tasks,projects,onSaveTask,onDeleteTask,onAddTask,onOpenTask}) {
  const [f,setF]=useState({...item});
  const upd=(k,v)=>{const nf=touchNow({...f,[k]:v});setF(nf);onSave(nf)};
  useEffect(()=>{setF({...item})},[item]);
  const area=areas.find(a=>a.id===f.areaId)||areas[0];
  const linked=type==="project"?(tasks||[]).filter(t=>t.projectId===f.id):[];
  const done=linked.filter(t=>t.status==="Complete").length;
  const prog=linked.length?Math.round((done/linked.length)*100):0;
  const parent=type==="task"&&f.projectId?(projects||[]).find(p=>p.id===f.projectId):null;
  const [adding,setAdding]=useState(false);const [nn,setNn]=useState("");
  const inputStyle={width:"100%",padding:"6px 10px",borderRadius:6,border:"1px solid var(--border)",fontSize:12,background:"var(--surface)",color:"var(--text)",boxSizing:"border-box",fontFamily:"var(--mono)"};

  return <div className="fade-in" style={{position:"fixed",right:0,top:0,bottom:28,width:380,maxWidth:"95vw",background:"var(--surface)",zIndex:1000,display:"flex",flexDirection:"column",borderLeft:"1px solid var(--border)"}}>
    <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{width:8,height:8,borderRadius:2,background:area.color,flexShrink:0}}/>
        <span style={{fontSize:11,color:"var(--text-secondary)"}}>{area.name} / {type}</span>
      </div>
      <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text-dim)",cursor:"pointer",fontSize:12,padding:"2px 6px"}}>esc</button>
    </div>
    <div style={{padding:"12px 16px"}}><input value={f.name} onChange={e=>upd("name",e.target.value)} style={{width:"100%",fontSize:15,fontWeight:700,border:"none",background:"transparent",color:"var(--text)",outline:"none",fontFamily:"var(--font)",letterSpacing:"-0.02em"}}/></div>
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:14}}>{STATUSES.map(s=><button key={s} onClick={()=>upd("status",s)} style={{padding:"3px 10px",borderRadius:4,border:f.status===s?`1px solid ${SC[s]}`:"1px solid var(--border)",background:f.status===s?`${SC[s]}12`:"transparent",color:f.status===s?SC[s]:"var(--text-dim)",fontSize:11,cursor:"pointer",transition:"all 0.1s"}}>{s}</button>)}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}>
        <div><label style={{fontSize:10,color:"var(--text-dim)",marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:"0.05em"}}>Priority</label><div style={{display:"flex",gap:2}}>{PRIORITIES.map(p=><button key={p} onClick={()=>upd("priority",p)} style={{width:24,height:24,borderRadius:4,border:f.priority===p?`1px solid ${PC[p]}`:"1px solid var(--border)",background:f.priority===p?`${PC[p]}15`:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.1s"}} title={p}><span style={{width:6,height:6,borderRadius:"50%",background:PC[p]}}/></button>)}</div></div>
        <div><label style={{fontSize:10,color:"var(--text-dim)",marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:"0.05em"}}>Effort</label><div style={{display:"flex",gap:2}}>{EFFORTS.map(e=><button key={e} onClick={()=>upd("effort",e)} style={{padding:"3px 7px",borderRadius:4,border:f.effort===e?`1px solid ${EC[e]}`:"1px solid var(--border)",background:f.effort===e?`${EC[e]}15`:"transparent",color:f.effort===e?EC[e]:"var(--text-dim)",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all 0.1s"}}>{e}</button>)}</div></div>
        <div><label style={{fontSize:10,color:"var(--text-dim)",marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:"0.05em"}}>Area</label><select value={f.areaId||""} onChange={e=>upd("areaId",e.target.value)} style={inputStyle}>{areas.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
        <div><label style={{fontSize:10,color:"var(--text-dim)",marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:"0.05em"}}>Due</label><input type="date" value={f.due||""} onChange={e=>upd("due",e.target.value)} style={inputStyle}/></div>
        <div><label style={{fontSize:10,color:"var(--text-dim)",marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:"0.05em"}}>Recurrence</label><select value={typeof f.recurrence==="object"?"custom":f.recurrence||"none"} onChange={e=>{const v=e.target.value;if(v==="none")upd("recurrence",null);else if(v==="custom")upd("recurrence",{type:"custom",days:14});else upd("recurrence",v)}} style={inputStyle}><option value="none">None</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="custom">Custom</option></select></div>
        {f.recurrence&&typeof f.recurrence==="object"&&<div><label style={{fontSize:10,color:"var(--text-dim)",marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:"0.05em"}}>Every X days</label><input type="number" value={f.recurrence.days||14} onChange={e=>upd("recurrence",{type:"custom",days:Math.max(1,parseInt(e.target.value)||1)})} min={1} style={inputStyle}/></div>}
        {type==="task"&&<div style={{gridColumn:"1/3"}}><label style={{fontSize:10,color:"var(--text-dim)",marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:"0.05em"}}>Project</label><select value={f.projectId||""} onChange={e=>upd("projectId",e.target.value||null)} style={inputStyle}><option value="">None</option>{(projects||[]).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>}
      </div>
      {type==="task"&&parent&&<div style={{marginBottom:14,padding:"8px 10px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:6}}><span style={{fontSize:10,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.05em"}}>project</span><div style={{fontSize:12,fontWeight:500,marginTop:2}}>{parent.name}</div></div>}
      {type==="project"&&linked.length>0&&<div style={{marginBottom:14,display:"flex",alignItems:"center",gap:10}}><Donut size={48} stroke={5} center={`${prog}%`} segments={[{pct:prog,color:area.color}]}/><div><div style={{fontSize:16,fontWeight:700,fontFamily:"var(--font)"}}>{done}<span style={{fontSize:11,color:"var(--text-secondary)"}}>/{linked.length}</span></div><div style={{fontSize:10,color:"var(--text-secondary)"}}>complete</div></div></div>}
      <div style={{marginBottom:14}}><label style={{fontSize:10,color:"var(--text-dim)",marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:"0.05em"}}>Notes</label><textarea value={f.notes||""} onChange={e=>upd("notes",e.target.value)} placeholder="..." rows={3} style={{...inputStyle,lineHeight:1.6,resize:"vertical"}}/></div>
      {type==="project"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:11,fontWeight:600}}>tasks ({linked.length})</span><Btn variant="ghost" small onClick={()=>setAdding(true)}>+ add</Btn></div>
        {adding&&<div style={{display:"flex",gap:3,marginBottom:6}}><input value={nn} onChange={e=>setNn(e.target.value)} placeholder="task name..." autoFocus onKeyDown={e=>{if(e.key==="Enter"&&nn.trim()){onAddTask({name:nn.trim(),projectId:f.id,areaId:f.areaId,status:"Not Started",priority:"Medium",effort:"M",due:"",notes:"",createdAt:now(),updatedAt:now(),touchedAt:now(),recurrence:null});setNn("");setAdding(false)}}} style={{...inputStyle,flex:1}}/><Btn small onClick={()=>{if(nn.trim()){onAddTask({name:nn.trim(),projectId:f.id,areaId:f.areaId,status:"Not Started",priority:"Medium",effort:"M",due:"",notes:"",createdAt:now(),updatedAt:now(),touchedAt:now(),recurrence:null});setNn("");setAdding(false)}}}>add</Btn></div>}
        {linked.sort((a,b)=>a.status==="Complete"?1:b.status==="Complete"?-1:0).map(t=><div key={t.id} className="hoverable" style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",borderRadius:6,background:"var(--card)",border:"1px solid var(--border)",marginBottom:2}}>
          <button onClick={()=>{const i=STATUSES.indexOf(t.status);onSaveTask(touchNow({...t,status:STATUSES[(i+1)%STATUSES.length]}))}} style={{width:14,height:14,borderRadius:3,border:`1.5px solid ${SC[t.status]}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,cursor:"pointer",background:t.status==="Complete"?SC[t.status]:"transparent",color:"#000",fontWeight:700}}>{t.status==="Complete"?"\u2713":""}</button>
          <div style={{flex:1,cursor:"pointer"}} onClick={()=>onOpenTask(t)}><div style={{fontSize:11,fontWeight:500,textDecoration:t.status==="Complete"?"line-through":"none",color:t.status==="Complete"?"var(--text-dim)":"var(--text)"}}>{t.name}</div></div>
          <span style={{width:5,height:5,borderRadius:"50%",background:PC[t.priority]}} title={t.priority}/>
        </div>)}
      </div>}
    </div>
    <div style={{padding:"10px 16px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between"}}><Btn variant="danger" small onClick={()=>{onDelete(f.id);onClose()}}>delete</Btn><Btn variant="ghost" small onClick={onClose}>done</Btn></div>
  </div>;
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [data,setData]=useState(loadData);
  const {notes,tasks,projects,areas,proposals}=data;
  const [view,setView]=useState("capture");
  const [panel,setPanel]=useState(null);
  const [showCapture,setShowCapture]=useState(false);
  const [review,setReview]=useState(null);
  const [toast,setToast]=useState(null);
  const [calMonth,setCalMonth]=useState(new Date());
  const [briefing,setBriefing]=useState(null);
  const [briefLoading,setBriefLoading]=useState(false);
  const [searchQ,setSearchQ]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [apiKeyVal,setApiKeyVal]=useState(localStorage.getItem(API_KEY_KEY)||"");
  const [proxyVal,setProxyVal]=useState(localStorage.getItem(PROXY_KEY)||"");
  const [testResult,setTestResult]=useState(null);
  const [testing,setTesting]=useState(false);
  const [clock, setClock]=useState(new Date());
  const saveKey=v=>{const c=v.trim();setApiKeyVal(c);localStorage.setItem(API_KEY_KEY,c)};
  const saveProxy=v=>{setProxyVal(v);localStorage.setItem(PROXY_KEY,v.trim())};

  useEffect(()=>{saveData(data)},[data]);
  const update=(key,fn)=>setData(prev=>({...prev,[key]:typeof fn==="function"?fn(prev[key]):fn}));

  useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setShowCapture(true)}};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h)},[]);

  // Clock tick
  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),30000);return()=>clearInterval(t)},[]);

  useEffect(()=>{try{const c=localStorage.getItem("synapse-digest");if(c){const cb=JSON.parse(c);setBriefing(cb.data)}}catch(e){}},[]);

  const refreshDigest=async()=>{setBriefLoading(true);const r=await aiDigest(tasks,projects,areas);if(r){setBriefing(r);localStorage.setItem("synapse-digest",JSON.stringify({data:r,time:now()}))}setBriefLoading(false)};

  const handleCapture=async rawText=>{
    setShowCapture(false);
    const note={id:uid(),createdAt:now(),updatedAt:now(),touchedAt:now(),rawText,source:"capture",processed:false,extractedIds:[],areaIds:[]};
    update("notes",prev=>[note,...prev]);
    setToast({message:"captured",type:"success"});
    setAiLoading(true);
    const result=await aiParseCapture(rawText,areas,projects,notes.slice(0,5));
    setAiLoading(false);
    if(result?.tasks?.length>0) setReview(result);
    else if(!result) setToast({message:"ai error: "+(window._lastAiError||"unavailable"),type:"warning"});
    else setToast({message:"no tasks extracted",type:"info"});
    if(getApiKey()){const props=await aiProposeProjects([note,...notes],areas);if(props?.length>0)update("proposals",prev=>[...props.map(p=>({...p,id:uid(),status:"pending",createdAt:now()})),...prev])}
  };

  const handleAcceptTasks=selected=>{
    const newTasks=selected.map(item=>({id:uid(),name:item.name,projectId:item.projectId||null,areaId:item.areaId||areas[0]?.id,status:"Not Started",priority:item.priority||"Medium",effort:item.effort||"M",due:item.due||null,recurrence:null,notes:"",sourceNoteId:notes[0]?.id||null,createdAt:now(),updatedAt:now(),touchedAt:now(),aiConfidence:item.confidence,aiProposed:true}));
    update("tasks",prev=>[...newTasks,...prev]);
    if(notes[0])update("notes",prev=>prev.map((n,i)=>i===0?{...n,processed:true,extractedIds:newTasks.map(t=>t.id)}:n));
    setReview(null);setToast({message:`${newTasks.length} tasks created`,type:"success"});
  };

  const saveTask=t=>update("tasks",prev=>prev.map(x=>x.id===t.id?t:x));
  const deleteTask=id=>{update("tasks",prev=>prev.filter(x=>x.id!==id));if(panel?.item?.id===id)setPanel(null)};
  const addTask=t=>{const n={...t,id:uid()};update("tasks",prev=>[n,...prev]);return n};
  const saveProject=p=>update("projects",prev=>prev.map(x=>x.id===p.id?p:x));
  const deleteProject=id=>{update("projects",prev=>prev.filter(x=>x.id!==id));update("tasks",prev=>prev.map(t=>t.projectId===id?{...t,projectId:null}:t));setPanel(null)};
  const addProject=p=>{const n={...p,id:uid(),createdAt:now(),updatedAt:now(),touchedAt:now()};update("projects",prev=>[n,...prev]);return n};
  const completeTask=t=>{
    const updated=touchNow({...t,status:"Complete"});
    update("tasks",prev=>{const list=prev.map(x=>x.id===t.id?updated:x);if(t.recurrence&&t.status!=="Complete"){const nd=getNextDue(t.due,t.recurrence);if(nd&&(!t.recurrenceEnd||nd<=t.recurrenceEnd))return[...list,{...t,id:uid(),status:"Not Started",due:nd,createdAt:now(),updatedAt:now(),touchedAt:now()}]}return list});
  };
  const handleCalDrop=(taskId,newDay)=>{const yr=calMonth.getFullYear(),mn=calMonth.getMonth();const d=yr+"-"+String(mn+1).padStart(2,"0")+"-"+String(newDay).padStart(2,"0");update("tasks",prev=>prev.map(x=>x.id===taskId?touchNow({...x,due:d}):x))};

  useEffect(()=>{if(panel){const src=panel.type==="project"?projects:tasks;const u=src.find(x=>x.id===panel.item.id);if(u&&JSON.stringify(u)!==JSON.stringify(panel.item))setPanel({...panel,item:u})}},[projects,tasks]);

  const inboxCount=proposals.filter(p=>p.status==="pending").length;
  const forgottenCount=tasks.filter(t=>isForgotten(t)).length;
  const activeTasks=tasks.filter(t=>t.status!=="Complete").length;
  const todayStr=new Date().toISOString().slice(0,10);
  const dueTodayCount=tasks.filter(t=>t.due===todayStr&&t.status!=="Complete").length;

  const sectionTitle=(title,sub)=><div style={{marginBottom:16}}><h1 style={{fontSize:18,fontWeight:800,fontFamily:"var(--font)",letterSpacing:"-0.03em",color:"var(--text)"}}>{title}</h1>{sub&&<p style={{fontSize:12,color:"var(--text-dim)",marginTop:2}}>{sub}</p>}</div>;

  return <div style={{display:"flex",height:"100vh",flexDirection:"column",overflow:"hidden"}}>
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
    {panel&&<div onClick={()=>setPanel(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:999,backdropFilter:"blur(4px)"}}/>}
    {showCapture&&<CaptureModal onCommit={handleCapture} onClose={()=>setShowCapture(false)}/>}
    {review&&<ReviewCard result={review} areas={areas} onAccept={handleAcceptTasks} onDismiss={()=>setReview(null)}/>}
    {toast&&<Toast message={toast.message} type={toast.type} onDismiss={()=>setToast(null)}/>}

    {/* SIDEBAR */}
    <div style={{width:220,background:"var(--surface)",borderRight:"1px solid var(--border)",padding:"12px 8px",display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
      {/* Logo */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",marginBottom:16}}>
        <div style={{width:24,height:24,borderRadius:4,background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#000",fontFamily:"var(--font)"}}>S</div>
        <div style={{fontSize:14,fontWeight:700,fontFamily:"var(--font)",letterSpacing:"-0.03em"}}>Synapse</div>
        <span style={{fontSize:9,color:"var(--text-dim)",marginLeft:"auto"}}>v2</span>
      </div>

      {/* Quick Capture */}
      <button onClick={()=>setShowCapture(true)} style={{
        display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:6,
        border:"1px solid var(--border)",background:"var(--card)",
        color:"var(--text-secondary)",fontSize:12,cursor:"pointer",width:"100%",textAlign:"left",
        marginBottom:16,transition:"border-color 0.15s"
      }}>
        <span style={{color:"var(--accent)",fontWeight:600}}>{">"}_</span>
        <span style={{flex:1}}>capture</span>
        <span style={{fontSize:9,color:"var(--text-dim)"}}>ctrl+k</span>
      </button>

      <div style={{fontSize:9,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.1em",padding:"0 10px",marginBottom:4}}>Navigate</div>
      <NavItem label="capture" active={view==="capture"} onClick={()=>setView("capture")}/>
      <NavItem label="stream" active={view==="stream"} onClick={()=>setView("stream")}/>
      <NavItem label="notes" active={view==="notes"} onClick={()=>setView("notes")} count={notes.length}/>
      <NavItem label="tasks" active={view==="tasks"} onClick={()=>setView("tasks")} count={activeTasks}/>
      <NavItem label="projects" active={view==="projects"} onClick={()=>setView("projects")} count={projects.filter(p=>p.status!=="Complete").length}/>
      <NavItem label="board" active={view==="board"} onClick={()=>setView("board")}/>
      <NavItem label="calendar" active={view==="calendar"} onClick={()=>setView("calendar")}/>

      <div style={{fontSize:9,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.1em",padding:"0 10px",margin:"12px 0 4px"}}>Intelligence</div>
      <NavItem label="dashboard" active={view==="dashboard"} onClick={()=>setView("dashboard")}/>
      <NavItem label="digest" active={view==="digest"} onClick={()=>setView("digest")} count={forgottenCount}/>
      <NavItem label="inbox" active={view==="inbox"} onClick={()=>setView("inbox")} count={inboxCount}/>

      <div style={{flex:1}}/>

      {/* Connection status */}
      <div style={{padding:"8px 10px",borderTop:"1px solid var(--border)",marginTop:8}}>
        <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:getApiKey()?"var(--green)":"var(--red)"}}/>
          <span style={{fontSize:10,color:"var(--text-dim)"}}>{getApiKey()?"connected":"no api key"}</span>
        </div>
        <button onClick={()=>setView("settings")} style={{background:"none",border:"none",color:view==="settings"?"var(--accent)":"var(--text-dim)",cursor:"pointer",fontSize:11,padding:0}}>settings</button>
      </div>
    </div>

    {/* MAIN */}
    <div className="dot-bg" style={{flex:1,padding:"20px 28px",overflowY:"auto"}}>

      {/* CAPTURE */}
      {view==="capture"&&<div className="fade-in">
        {sectionTitle("Capture","dump thoughts, extract tasks")}
        <Card hover onClick={()=>setShowCapture(true)} style={{textAlign:"center",padding:"40px 24px",border:"1px dashed var(--border)"}}>
          <div style={{fontSize:13,color:"var(--accent)",fontWeight:600,marginBottom:4}}>{">"}_</div>
          <div style={{fontSize:14,fontWeight:600,fontFamily:"var(--font)",marginBottom:2}}>start a mind dump</div>
          <div style={{fontSize:12,color:"var(--text-dim)"}}>ctrl+k from anywhere</div>
          {aiLoading&&<div style={{marginTop:10,color:"var(--accent)",fontSize:11}} className="pulse">processing...</div>}
        </Card>
        {notes.length>0&&<div style={{marginTop:20}}>
          <div style={{fontSize:10,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Recent</div>
          {notes.slice(0,5).map(n=><Card key={n.id} style={{marginBottom:4,padding:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:10,color:"var(--text-dim)"}}>{fmtFull(n.createdAt)}</span>
              {n.extractedIds.length>0&&<Tag color="var(--green)">{n.extractedIds.length} tasks</Tag>}
            </div>
            <div style={{fontSize:12,color:"var(--text-secondary)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{n.rawText.slice(0,200)}{n.rawText.length>200?"...":""}</div>
          </Card>)}
        </div>}
      </div>}

      {/* STREAM */}
      {view==="stream"&&<div className="fade-in">
        {sectionTitle("Stream","chronological feed")}
        {(()=>{
          const all=[...notes.map(n=>({...n,_type:"note",_ts:n.createdAt})),...tasks.map(t=>({...t,_type:"task",_ts:t.createdAt})),...projects.map(p=>({...p,_type:"project",_ts:p.createdAt}))].sort((a,b)=>new Date(b._ts)-new Date(a._ts));
          const grouped={};all.forEach(item=>{const day=item._ts?.slice(0,10)||"?";if(!grouped[day])grouped[day]=[];grouped[day].push(item)});
          return Object.entries(grouped).map(([day,items])=><div key={day} style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>{day===todayStr?"today":day}</div>
            {items.map(item=><div key={item.id} className="hoverable" style={{display:"flex",gap:8,padding:"7px 10px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:6,marginBottom:2,cursor:item._type!=="note"?"pointer":"default",fontSize:12}} onClick={()=>{if(item._type==="task")setPanel({type:"task",item});if(item._type==="project")setPanel({type:"project",item})}}>
              <span style={{fontSize:10,color:"var(--text-dim)",minWidth:36}}>{fmtTime(item._ts)}</span>
              <span style={{width:4,height:4,borderRadius:"50%",background:item._type==="note"?"var(--text-dim)":item._type==="task"?"var(--blue)":"var(--accent)",marginTop:5,flexShrink:0}}/>
              <div style={{flex:1}}><div style={{fontWeight:item._type==="note"?400:500}}>{item._type==="note"?item.rawText.slice(0,80):item.name}</div>
              <div style={{display:"flex",gap:3,marginTop:2}}><span style={{fontSize:10,color:"var(--text-dim)"}}>{item._type}</span>{item.status&&<Tag color={SC[item.status]} style={{fontSize:9,padding:"0 4px"}}>{item.status}</Tag>}</div></div>
            </div>)}
          </div>);
        })()}
        {!notes.length&&!tasks.length&&<Card style={{textAlign:"center",padding:40,color:"var(--text-dim)"}}>empty. ctrl+k to start.</Card>}
      </div>}

      {/* NOTES */}
      {view==="notes"&&<div className="fade-in">
        {sectionTitle("Notes")}
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="search..." style={{width:"100%",maxWidth:320,padding:"6px 10px",borderRadius:6,border:"1px solid var(--border)",fontSize:12,background:"var(--surface)",color:"var(--text)",marginBottom:12,boxSizing:"border-box"}}/>
        {notes.filter(n=>!searchQ||n.rawText.toLowerCase().includes(searchQ.toLowerCase())).map(n=><Card key={n.id} style={{marginBottom:6,padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:10,color:"var(--text-dim)"}}>{fmtFull(n.createdAt)}</span>
            <div style={{display:"flex",gap:3}}>{n.extractedIds.length>0&&<Tag color="var(--green)">{n.extractedIds.length} tasks</Tag>}<Tag>{n.source}</Tag></div>
          </div>
          <div style={{fontSize:12,color:"var(--text)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{n.rawText}</div>
          {n.extractedIds.length>0&&<div style={{marginTop:6,paddingTop:6,borderTop:"1px solid var(--border)"}}>
            {tasks.filter(t=>n.extractedIds.includes(t.id)).map(t=><div key={t.id} onClick={()=>setPanel({type:"task",item:t})} style={{fontSize:11,color:"var(--accent)",cursor:"pointer",padding:"1px 0"}}>-> {t.name}</div>)}
          </div>}
          <div style={{textAlign:"right",marginTop:4}}><Btn variant="ghost" small onClick={()=>update("notes",prev=>prev.filter(x=>x.id!==n.id))}>delete</Btn></div>
        </Card>)}

        </Card>

        <Card style={{maxWidth:480}}>
          <div style={{fontSize:13,fontWeight:600,fontFamily:"var(--font)",marginBottom:8}}>Data</div>
          <div style={{display:"flex",gap:4}}>
            <Btn variant="secondary" small onClick={()=>{const d=JSON.stringify(data,null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="synapse-"+new Date().toISOString().slice(0,10)+".json";a.click()}}>export</Btn>
            <Btn variant="secondary" small onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const reader=new FileReader();reader.onload=ev=>{try{setData(JSON.parse(ev.target.result));setToast({message:"imported",type:"success"})}catch(err){setToast({message:"invalid file",type:"error"})}};reader.readAsText(e.target.files[0])};inp.click()}}>import</Btn>
            <Btn variant="danger" small onClick={()=>{if(confirm("Wipe all data?")){localStorage.removeItem(STORAGE_KEY);localStorage.removeItem("synapse-digest");location.reload()}}}>wipe</Btn>
          </div>
        </Card>
      </div>}
    </div>

    {panel&&<DetailPanel type={panel.type} item={panel.item} areas={areas} onClose={()=>setPanel(null)} onSave={panel.type==="project"?saveProject:saveTask} onDelete={panel.type==="project"?deleteProject:deleteTask} tasks={tasks} projects={projects} onSaveTask={saveTask} onDeleteTask={deleteTask} onAddTask={addTask} onOpenTask={t=>setPanel({type:"task",item:t})}/>}
    </div>

    {/* STATUS BAR */}
    <div style={{height:28,background:"var(--surface)",borderTop:"1px solid var(--border)",display:"flex",alignItems:"center",padding:"0 12px",gap:16,flexShrink:0,fontSize:10,color:"var(--text-dim)"}}>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:4,height:4,borderRadius:"50%",background:getApiKey()?"var(--green)":"var(--text-dim)"}}/>synapse</span>
      <span>{activeTasks} tasks</span>
      {dueTodayCount>0&&<span style={{color:"var(--accent)"}}>{dueTodayCount} due today</span>}
      {forgottenCount>0&&<span style={{color:"var(--yellow)"}}>{forgottenCount} forgotten</span>}
      <span style={{flex:1}}/>
      <span>{clock.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})}</span>
      <span>{clock.toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit",hour12:false})}</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
